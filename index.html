r Pipeline"}),(0,s.jsx)("p",{children:"The simplest chain that maps to Architecture_V1. Each policy is a single link. No conditional branching. No feedback. Seed record goes in, enriched family_file comes out."}),(0,s.jsxs)("p",{children:["The flow is: load seed record → construct P1 system prompt with name and class year → P1 agent runs its tool-use loop (searches, discovers family members, outputs candidates) → ",(0,s.jsx)("strong",{children:"Gate A"})," validates candidates against schema, filters below confidence threshold, checks for duplicates against existing family_files, creates or merges family_file → construct P2 system prompt with the family_file → P2 agent runs (searches, fills personal_data fields, outputs deltas) → ",(0,s.jsx)("strong",{children:"Gate B"})," validates deltas, runs merge strategy, checks relationship consistency, writes to disk."]}),(0,s.jsx)("p",{children:"This is the right starting point because it teaches you the core mechanics: how system prompts and tool schemas shape agent behavior, how to design output schemas that serve both the LLM and the gate, how gates prevent error propagation, and what the latency profile looks like (each link takes 5-30 seconds depending on how many tool-use iterations the agent needs). But it has a critical limitation: there is no feedback between P1 and P2. The enrichment P2 discovers doesn't help P1 find more family members."}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"Level B: Chain with Feedback Loop"}),(0,s.jsxs)("p",{children:["This is where the Architecture_V1 insight comes to life. After P2 enriches the family_file, a ",(0,s.jsx)("strong",{children:"feedback gate"})," examines the enriched data and determines whether P1 should run again. The feedback gate doesn't make an LLM call — it applies heuristic rules to detect signals of undiscovered family members."]}),(0,s.jsx)("p",{children:'Here\'s a concrete walkthrough. Pass 1: P1 receives "Alice Chen, MIT 2025." It searches the web, discovers Robert Chen (father) from a LinkedIn connection. Gate A creates the family_file with two members. P2 enriches both members. It discovers Robert Chen is CEO of Chen Industries. It discovers Alice has a sibling mentioned on a family foundation page: Brian Chen. Gate B writes the enrichment data.'}),(0,s.jsx)("p",{children:'Now the feedback gate runs. It scans the enriched personal_data for references to people not in the family_file. It finds "Brian Chen" — referenced in the foundation page, not yet a member. It emits Brian as a new discovery target. P1 runs again, but this time it knows about the Chen family, Chen Industries, the foundation. It searches for Brian Chen with this context and finds him immediately — much higher recall than a cold search would have produced.'}),(0,s.jsxs)("p",{children:["The feedback loop ",(0,s.jsx)("strong",{children:"must converge"}),". Three mechanisms guarantee termination: a hard round cap (maximum N feedback iterations), a no-new-targets check (if the feedback gate returns nothing, stop), and a diminishing returns threshold (if the information gain per round drops below a minimum, stop). Without all three, the loop can theoretically run forever, which in practice means burning your token budget on increasingly marginal discoveries."]}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"Level C: Branching Chains"}),(0,s.jsx)("p",{children:"Not all family members need the same enrichment strategy. Alice Chen has LinkedIn, GitHub, and Instagram. Robert Chen has SEC filings and real estate records. Running the same generic P2 agent on both wastes tokens — Alice needs social media extraction tools, Robert needs public records tools."}),(0,s.jsx)("p",{children:"At Level C, the chain branches after a router classifies each member by their data profile. The router is a deterministic function, not an LLM call. It examines the member's existing data: if there are social media handles or email addresses, route to the internet-heavy subchain. If there's career or education data but no internet presence, route to the records-heavy subchain. If there's almost nothing, route to the minimal-data subchain."}),(0,s.jsx)("p",{children:"Each subchain is itself a mini-chain with its own gates, its own specialized tools, and its own prompts. The internet-heavy subchain might have three links: social media profile extraction → cross-platform identity linking → contact information enrichment. The records-heavy subchain might focus on public filings and employment records. After all subchains complete, a merge step reconciles overlapping data and writes the combined result."}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"Level D: Dynamic Chain Composition"}),(0,s.jsx)("p",{children:"The chain structure itself is determined at runtime. A planner analyzes the family_file's current state — which fields are missing, what the field dependency graph looks like — and constructs a chain tailored to the specific gaps. Education data is filled before career data (because knowing the university helps find the employer). Career data is filled before affiliations (because knowing the company helps find industry organizations). This ordering is derived from a topological sort of the field dependency graph."}),(0,s.jsx)("p",{children:"Dynamic composition is post-MVP complexity. It's documented here so the architecture doesn't prevent it, but it requires chain instrumentation (telemetry on what each link produces) and enough historical data to inform the planner's decisions. For now, static chains (Levels A-C) are sufficient."}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"Chain Composition Patterns"}),(0,s.jsx)("p",{children:"Chains can be composed in four ways, and your Architecture_V1 pipeline will use all four:"}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Sequential:"})," Output of A feeds B. This is P1 → gate → P2. The simplest composition."]}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Parallel:"})," Both links receive the same input. Results are merged. Useful for running per-member enrichment on multiple members concurrently — each member's P2 agent runs in parallel since they're independent."]}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Conditional:"})," Routing determines which link runs. Only one executes. This is the Level C branching pattern — the router picks a subchain."]}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Iterative:"})," The same link runs repeatedly with updated state. This is the Level B feedback loop — P1 → P2 → feedback gate → back to P1."]}),(0,s.jsx)("p",{children:"Your complete pipeline combines all four: sequential (P1 → P2 for each student), iterative (feedback loop between P1 and P2), conditional (route members to specialized subchains), and parallel (run subchains concurrently)."}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"Debugging Chains"}),(0,s.jsx)("p",{children:"When the final output is wrong, how do you find which link or gate introduced the error? Three practices make chains debuggable."}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Trace logging."})," Every gate logs its input, its decision, and its output. The chain trace gives you a complete picture: which agent was dispatched at each link, how many tokens it consumed, how many tool calls it made, what the gate passed through or filtered out. This is your primary debugging tool."]}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Gate replay."})," Since gates are deterministic, you can save the input to any gate and replay it later. If a gate incorrectly filtered a valid candidate, you can reproduce the exact scenario with the saved input. This is far harder to do with LLM-based evaluators, which is another reason gates should not make LLM calls."]}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Diff comparison."})," Compare the family_file state before and after each link. The diff tells you exactly what changed: new members added, fields filled, edges created. If a field is wrong, the diff shows which link introduced it. Combined with the chain trace, this gives you root-cause analysis in minutes rather than hours."]})]})},tag:"core"},{id:"ch3",num:3,title:"Queue: Agent Dispatch",subtitle:"Intra-Policy Selection & Work Units",component:function(){return(0,s.jsxs)("article",{className:"prose-body",children:[(0,s.jsx)("div",{className:"chapter-badge",children:"Chapter 03"}),(0,s.jsx)("h1",{className:"heading-display text-4xl mb-3",children:"Queue: Agent Dispatch"}),(0,s.jsx)("p",{className:"text-lg mb-10",style:{color:"var(--text-tertiary)",fontFamily:"var(--font-body)"},children:"The queue system serves two distinct purposes. This chapter covers the first: given a policy and a target, which agent do we run, with what data, and when is its job done?"}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"The Two Queue Problems"}),(0,s.jsx)("p",{children:"The queue system in Architecture_V1 is not one system — it is two systems that happen to share a data structure. Conflating them leads to confusion about responsibilities and, worse, to code where population-level traversal logic is tangled with per-unit dispatch logic, making both harder to modify independently."}),(0,s.jsxs)("p",{children:["The first system, covered in this chapter, is ",(0,s.jsx)("strong",{children:"intra-policy dispatch"}),": given a specific piece of work to do (enrich this member, discover this family), how do we select the right agent configuration, prioritize it against other work, manage its dependencies, and track its lifecycle? This system operates at the level of individual work units — it doesn't know or care about the broader population strategy."]}),(0,s.jsxs)("p",{children:["The second system, covered in Chapter 4, is ",(0,s.jsx)("strong",{children:"population-level traversal"}),": given N students in the seed CSV, in what order do we process them, how deep do we go on each family before moving to the next, and when do we come back for subsequent passes? This system operates at the level of families and phases — it doesn't know or care about the mechanics of individual agent invocations."]}),(0,s.jsxs)("p",{children:["These two systems interact — the traversal system feeds work into the dispatch queue, and the dispatch queue's results influence the traversal system's decisions about what to process next — but they have different concerns, different state, and different optimization criteria. The dispatch queue optimizes for ",(0,s.jsx)("em",{children:"agent effectiveness per work unit"}),": choosing the right agent, giving it the right tools, and tracking whether it succeeded. The traversal system optimizes for ",(0,s.jsx)("em",{children:"information yield across the population"}),": deciding which families deserve more attention and when to move on. Mixing these concerns in a single queue leads to a system that does neither well. Keep them separate from day one."]}),(0,s.jsx)("div",{className:"section-divider",children:"The Work Unit"}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"Anatomy of a Work Unit"}),(0,s.jsxs)("p",{children:["The atomic unit of work in the dispatch queue is a ",(0,s.jsx)("code",{className:"code-inline",children:"WorkUnit"}),". It represents a single agent invocation waiting to happen — everything the system needs to dispatch an agent, track its progress, and handle its outcome. Designing the work unit well is critical because it is the contract between the traversal system (which creates work units) and the dispatch system (which processes them). If the contract is unclear, both systems become harder to build and debug."]}),(0,s.jsxs)("p",{children:["A work unit captures several categories of information. The ",(0,s.jsx)("strong",{children:"identity"}),' fields tell you what this work is about: a unique ID, the family_id, the target member_id (null for whole-family operations), and which policy governs this work ("p1" or "p2"). The ',(0,s.jsx)("strong",{children:"state snapshot"})," fields capture the target's data state at the time the unit was enqueued: the pass number, a DataProfile summary, and any specific fields requested (for targeted P2 enrichment). The ",(0,s.jsx)("strong",{children:"constraint"})," fields bound the work: a token budget, an iteration cap, and an optional deadline for time-bounded processing. The ",(0,s.jsx)("strong",{children:"provenance"})," fields tell you where this work came from: what created it (initial BFS pass? feedback gate? manual re-queue?) and what other work units it depends on. Finally, the ",(0,s.jsx)("strong",{children:"execution tracking"})," fields record what happened: attempt count, last attempt timestamp, and last result status."]}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"The Data Profile"}),(0,s.jsx)("p",{children:"The data profile deserves special attention because it serves a dual purpose. For priority scoring, it provides the signals needed to rank work units: how empty is this member's profile? Does the member have internet presence (which makes web-search-based enrichment more likely to succeed)? How many relationship edges exist (which affects whether cross-referencing is viable)? For agent selection, it provides the signals the policy's selector needs to choose the right agent: does education data exist (enabling enrichment-aware discovery)? How many members are in the family (affecting the per-member vs whole-family mode decision)?"}),(0,s.jsx)("p",{children:"Computing the data profile is cheap — it reads metadata and counts fields, consuming milliseconds rather than the seconds an LLM call takes. This matters because the data profile is computed for every work unit in the queue, and the queue might contain thousands of     fill_ratio = (sum(unit.data_profile.fields_populated.values())

ndex being up-to-date (which happens between phases)."}),(0,s.jsxs)("p",{children:["Each work unit carries a ",(0,s.jsx)("code",{className:"code-inline",children:"depends_on"})," list of work unit IDs. The dequeue function checks dependencies before returning a unit: if any dependency has not yet reached a terminal state (completed, partial, or skipped), the unit remains in the queue. This is equivalent to a topological ordering that naturally emerges from the dependency declarations — the queue processes units in dependency order without requiring an explicit sort."]}),(0,s.jsxs)("p",{children:['There\'s a subtlety in what counts as a "satisfied" dependency. A failed work unit that will be retried is ',(0,s.jsx)("em",{children:"not"})," in a terminal state — its dependents continue to wait, because the retry might succeed and produce data the dependent needs. A partial work unit ",(0,s.jsx)("em",{children:"is"})," terminal — its dependents can proceed with whatever data is available, rather than waiting for data that may never arrive. A skipped unit is terminal — its dependents proceed, accepting that the data won't be available. This design ensures dependencies never deadlock: every dependency chain eventually terminates because failed units have a maximum retry count that leads to the skipped terminal state."]}),(0,s.jsxs)("div",{className:"callout-green callout",children:[(0,s.jsx)("strong",{children:"No Deadlock Guarantee"}),(0,s.jsx)("p",{className:"mt-2 mb-0",children:"The dependency system cannot deadlock because: (1) every work unit eventually reaches a terminal state (completed, partial, or skipped — the retry cap ensures this), (2) dependencies are acyclic by construction (P2 depends on P1, never the reverse), and (3) terminal dependencies always release their dependents. This means the queue always drains, even in the worst case where every agent invocation fails."})]}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"Token Budget Management"}),(0,s.jsx)("p",{children:"The token budget system is the financial controller of the pipeline. Without it, a single complex family could consume your entire API budget, leaving hundreds of other families untouched. The budget operates at three levels — global, per-family, and per-member — and the strictest limit wins."}),(0,s.jsxs)("p",{children:["The ",(0,s.jsx)("strong",{children:"global budget"})," is the total token allocation for the entire pipeline run. When it's exhausted, processing stops entirely. This is the circuit breaker that prevents runaway costs."]}),(0,s.jsxs)("p",{children:["The ",(0,s.jsx)("strong",{children:"per-family budget"})," caps how much any single family can consume. This ensures equitable coverage across the population — no family monopolizes the resources, even if it's large and data-rich with many members to discover and enrich. When a family's budget is exhausted, all remaining work units for that family are transitioned to skipped. The system moves on to other families rather than spending more tokens on diminishing returns."]}),(0,s.jsxs)("p",{children:["The ",(0,s.jsx)("strong",{children:"per-member budget"})," caps how much any single member can consume. This prevents the system from running dozens of agent invocations on one particularly elusive member while ignoring others in the same family. A member who resists enrichment after three attempts is probably not going to yield data on the fourth try."]}),(0,s.jsx)("p",{children:"When a work unit is dispatched, it receives the minimum of its own declared budget, its family's remaining budget, and its target member's remaining budget. After the agent completes, the actual tokens consumed (input + output, reported by the API response) are debited from all applicable budgets. This means a single expensive invocation can exhaust a member's budget without exhausting the family's budget, allowing other members in the same family to continue processing."}),(0,s.jsx)("p",{ch , config: DispatchConfig):
    semaphore = asyncio.Semaphore(config.max_concurrency)
    completed: set[str] = set()
    tasks: list[asyncio.Task] = []

    while not queue.empty() and not budget_manager.global_exhausted():
        unit = dequeue_next(queue, completed)
        if unit is None:
            if tasks:
                await asyncio.wait(tasks, return_when=asyncio.FIRST_COMPLETED)
                tasks = [t for t in tasks if not t.done()]
                continue
            break

        async def process(u: WorkUnit):
            async with semaphore:
                config = select_and_build_config(u)
                result = await execute_agent(config, u, client, registry)
                handle_result(u, result, queue, completed)

        tasks.append(asyncio.create_task(process(unit)))

    await asyncio.gather(*tasks)`})}),(0,s.jsxs)("p",{children:["The ",(0,s.jsx)("code",{className:"code-inline",children:"handle_result"})," function is where terminal states are assigned, merges happen, telemetry is recorded, and new work units are generated. It's the function that connects the dispatch system to everything else — the state management layer (Chapter 6), the feedback gates (Chapter 2), and the telemetry pipeline (Chapter 8). Getting this function right is the difference between a system that runs cleanly and one that silently loses data or generates duplicate work."]})]})},tag:"queue"},{id:"ch4",num:4,title:"Queue: Population Traversal",subtitle:"BFS, DFS & Hybrid Strategies",component:function(){return(0,s.jsxs)("article",{className:"prose-body",children:[(0,s.jsx)("div",{className:"chapter-badge",children:"Chapter 04"}),(0,s.jsx)("h1",{className:"heading-display text-4xl mb-3",children:"Queue: Population Traversal"}),(0,s.jsx)("p",{className:"text-lg mb-10",style:{color:"var(--text-tertiary)",fontFamily:"var(--font-body)"},children:"Given N students, in what order do we process them? How deep do we go? When do we come back? This chapter explores BFS, DFS, and the hybrid approach that fits Architecture_V1."}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"The Population as a Graph"}),(0,s.jsxs)("p",{children:["The seed CSV defines an implicit graph. Nodes are people — both seed students and their discovered family members. Edges are relationships. But unlike a classical graph traversal problem, this graph is ",(0,s.jsx)("strong",{children:"not known upfront"}),". It is revealed as the pipeline runs. When you start, you have N disconnected nodes (the seed students). After the first P1 pass, you have N small clusters (each student plus their discovered family). After enrichment and feedback, some clusters merge (when two seed students turn out to be siblings), new members appear, and the graph grows outward."]}),(0,s.jsxs)("p",{children:["This \"discover as you traverse\" property is what makes the traversal strategy so consequential. A classical BFS or DFS over a known graph is a solved problem — the optimal strategy depends on what you're looking for and the graph's topology, but the algorithm itself is straightforward. A BFS or DFS over an ",(0,s.jsx)("em",{children:"emerging"})," graph requires decisions about how much to explore before moving on, when to revisit previously explored territory with new information, and how to incorporate what you've learned from one part of the graph into your exploration of another part. These are not algorithmic decisions — they're ",(0,s.jsx)("em",{children:"economic"})," decisions about how to allocate a finite budget (tokens, time) across an uncertain landscape."]}),(0,s.jsx)("p",{children:"The traversal strategy is also the primary determinant of the system's runtime behavior. BFS produces predictable, parallel workloads. DFS produces deep, sequential workloads. The choice affects API rate limiting, memory usage, checkpointing complexity, and the ability to produce intermediate results. Understanding the tradeoffs at a deep level is essential before committing to an implementation."}),(0,s.jsx)("div",{className:"pull-quote",children:"The population is a graph you discover as you traverse it. Every traversal strategy is making a bet about where the most information is hiding."}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"BFS: Breadth-First Across the Population"}),(0,s.jsx)("p",{children:'Breadth-first search processes all students at a shallow depth before going deeper on any single family. Applied to Architecture_V1, "depth" maps to pipeline phases. Depth 0 is all seed students — the CSV rows, each representing a starting node. Depth 1 is P1 discovery for every student — running the cold_start agent to discover immediate family members. Depth 2 is P2 enrichment for all discovered families — running enrichment agents across every member found in Depth 1. Depth 3 is P1 re-discovery using enrichment data — the feedback loop from Chapter 2, applied across the entire population simultaneously. And so on, alternating between discovery and enrichment at each depth level.'}),(0,s.jsxs)("p",{children:["The BFS queue implementation maintains two levels: ",(0,s.jsx)("code",{className:"code-inline",children:"current_level"})," (the items being processed at the current depth) and ",(0,s.jsx)("code",{className:"code-inline",children:"next_level"})," (items discovered during processing that belong to the next depth). Dequeue always pulls from current_level. When current_level is empty, swap next_level into current_level and increment the depth counter. A visited set prevents processing the same (family_id, member_id, depth) triple twice. This guarantees uniform coverage — after depth 2, every seed student has been touched by both P1 and P2, regardless of family complexity or data availability."]}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Visualizing the BFS Token Distribution"}),(0,s.jsx)("p",{children:"BFS distributes tokens uniformly across the population at each depth. Think of it as spreading paint evenly across a surface — thin coats, many layers:"}),(0,s.jsxs)("div",{className:"diagram-container",style:{fontFamily:"var(--font-mono)",fontSize:"0.75rem",lineHeight:1.6,color:"var(--text-secondary)"},children:[(0,s.jsx)("div",{style:{color:"var(--text-muted)",marginBottom:"0.5rem"},children:"Token spend per family (N=8 families, 3 depths):"}),(0,s.jsxs)("div",{children:[(0,s.jsx)("span",{style:{color:"var(--amber-bright)"},children:"Depth 1: "}),"████████ ████████ ████████ ████████ ████████ ████████ ████████ ████████"]}),(0,s.jsxs)("div",{children:[(0,s.jsx)("span",{style:{color:"var(--amber-mid)"},children:"Depth 2: "}),"████████ ████████ ████████ ████████ ████████ ████████ ████████ ████████"]}),(0,s.jsxs)("div",{children:[(0,s.jsx)("span",{style:{color:"var(--amber-dim)"},children:"Depth 3: "}),"█████░░░ ████████ ██░░░░░░ ████████ █████░░░ ░░░░░░░░ ████████ ███░░░░░"]}),(0,s.jsx)("div",{style:{color:"var(--text-muted)",marginTop:"0.5rem"},children:"░ = skipped (no new targets from feedback gate)"})]}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"When BFS Works Well"}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Uniform data availability."})," If all students have roughly similar amounts of discoverable data — a reasonable assumption when the seed population is drawn from the same institution and class year — BFS allocates effort evenly and no family is neglected. Each family gets exactly one P1 pass and one P2 pass before any family gets a second pass. This fairness property is valuable when you need comprehensive coverage (every family has at least basic data) rather than deep coverage (some families are fully explored, others untouched)."]}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Independent families."})," If families don't overlap — no shared members across seed records — each BFS pass can process all families in parallel. This is the natural case when the seed CSV doesn't contain siblings, and it's the case that benefits most from async concurrency. During a BFS depth level, you can run 10, 20, or 50 agent invocations simultaneously, bounded only by your API rate limits and concurrency semaphore."]}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Rate-limited APIs."}),' BFS naturally spreads API calls across different search targets. If you\'re searching for 100 different people in round-robin fashion, you\'re unlikely to hit per-query rate limits on any search engine, because consecutive searches are for different names in different contexts. DFS, by contrast, hammers the same family repeatedly — "Robert Chen Goldman Sachs," "Robert Chen finance," "Robert Chen trustee" — which can trigger search engine cooldowns or return progressively more cached (and less useful) results.']}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Early population-level insights."})," After completing depth 2 (P1 + P2 for everyone), you have a shallow but complete view of the entire population. You know every family's basic structure, which families are large, which members have internet presence, which employers and schools are most common. This data feeds the population index (described later in this chapter), which makes all subsequent processing more effective. BFS front-loads this population-level learning, while DFS delays it until all families are individually complete."]}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"When BFS Fails"}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"High variance in data richness."})," Some students have extensive online presence — LinkedIn, GitHub, published papers, news mentions, family foundation pages. Others have almost nothing — no social media, no public records, a common name that generates thousands of false-positive search results. BFS gives both the same treatment at each depth level, wasting tokens on low-yield targets (the agent searches fruitlessly for data that doesn't exist) while leaving high-yield targets underexplored (the agent found 20 signals but only followed 3 because the single-pass depth limit cut it off). A student with 50 discoverable data points gets the same single-pass treatment as a student with 3."]}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Family overlaps."})," If Student_A and Student_B are siblings (both in the seed CSV), BFS processes them independently on the first pass. Student_A's cold_start agent discovers \"Robert Chen (father), Mei Chen (mother), Brian Chen (sibling).\" Student_B — who is Brian Chen — independently discovers \"Robert Chen (father), Mei Chen (mother), Alice Chen (sibling).\" These two family_files describe the same family but were created separately. They must be reconciled after the BFS phase: detected via member overlap (both files contain Robert and Mei), then merged into a single file using the family reconciliation process. This reconciliation adds complexity, and if the merge logic isn't careful, it can lose data (one file's relationship edges overwritten by the other's) or create duplicates."]}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"No cross-family learning on early passes."}),' The core limitation of BFS is that pass N for family_K doesn\'t benefit from what was learned during pass N for families 1 through K-1. Within a single depth level, all families are processed with the same global state. Cross-family learning only becomes available after a complete depth level is finished and the population index is rebuilt. This means the most valuable type of learning — "this company keeps appearing across multiple families" — is delayed until the depth boundary.']}),(0,s.jsx)("div",{className:"section-divider",children:"Depth-First Search"}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"DFS: Depth-First Per Family"}),(0,s.jsx)("p",{children:"Depth-first search fully processes one family before moving to the next. Within a family, the processing is also depth-first: discover a member, enrich them immediately, follow any references in their enrichment data to discover new members, enrich those, and continue until the family converges (no new members discovered, or budget exhausted). Only then does the system pop to the next family in the seed CSV."}),(0,s.jsx)("p",{children:"The DFS implementation uses a stack rather than a queue. The family stack contains the ordered list of families to process. The internal stack contains work units within the current family. Dequeue always pulls from the internal stack first — continue the current family. Only when the internal stack is empty (current family is converged) does the system pop from the family stack and begin the next family. Newly discovered work from feedback gates is pushed onto the internal stack, ensuring it's processed immediately — before any other family gets attention. This is the defining property of DFS: new discoveries are explored immediately rather than queued for later."}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Visualizing the DFS Token Distribution"}),(0,s.jsxs)("div",{className:"diagram-container",style:{fontFamily:"var(--font-mono)",fontSize:"0.75rem",lineHeight:1.6,color:"var(--text-secondary)"},children:[(0,s.jsx)("div",{style:{color:"var(--text-muted)",marginBottom:"0.5rem"},children:"Token spend per family (same 8 families, same budget):"}),(0,s.jsxs)("div",{children:[(0,s.jsx)("span",{style:{color:"var(--amber-bright)"},children:"Fam 1: "}),"████████████████████████████████████  (deep — rich data)"]}),(0,s.jsxs)("div",{children:[(0,s.jsx)("span",{style:{color:"var(--amber-bright)"},children:"Fam 2: "}),"██████████████████████████  (deep)"]}),(0,s.jsxs)("div",{children:[(0,s.jsx)("span",{style:{color:"var(--amber-mid)"},children:"Fam 3: "}),"████████  (sparse — converged fast)"]}),(0,s.jsxs)("div",{children:[(0,s.jsx)("span",{style:{color:"var(--amber-mid)"},children:"Fam 4: "}),"████████████████████████████████████████████  (very rich)"]}),(0,s.jsxs)("div",{children:[(0,s.jsx)("span",{style:{color:"var(--amber-dim)"},children:"Fam 5: "}),"████  (very sparse)"]}),(0,s.jsxs)("div",{children:[(0,s.jsx)("span",{style:{color:"var(--amber-dim)"},children:"Fam 6: "}),"████████████████████  (moderate)"]}),(0,s.jsxs)("div",{style:{color:"var(--text-muted)"},children:["Fam 7: ","░░░░░░  (budget exhausted, never reached)"]}),(0,s.jsxs)("div",{style:{color:"var(--text-muted)"},children:["Fam 8: ","░░░░░░  (budget exhausted, never reached)"]})]}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"When DFS Works Well"}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Rich, interconnected families."})," When discovering one member leads to many others — a parent's LinkedIn mentions three children, a family foundation page lists all trustees, a news article about a business acquisition names the entire executive family — DFS follows these chains naturally. The feedback loop between P1 and P2 fires rapidly, and each pass has rich context from the prior pass because the enrichment data was just written moments ago rather than being separated by an entire BFS depth level across the population."]}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Family overlap detection."})," Because DFS fully processes one family before starting the next, it builds a complete picture of family_1 before encountering family_2. If student_2 turns out to be a member of family_1's extended family, DFS detects this immediately (the member already exists in family_1's file) rather than creating a duplicate that needs post-hoc reconciliation. This advantage is significant for populations with a high sibling rate."]}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Maximum depth per family."})," If the primary goal is to extract as much data as possible from each family — maximizing per-family completeness rather than population-wide coverage — DFS gets you there fastest. By the time you move to family_2, family_1 is as complete as the system can make it. This is the right strategy when you care more about data quality for a subset of families than about having shallow data for all families."]}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"When DFS Fails"}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Stuck on sparse families."}),' DFS can spend many iterations on a family with little discoverable data before the convergence check triggers. Each P1 pass returns zero new members. Each P2 pass returns mostly empty enrichment. But the convergence condition — "no new information for N consecutive passes" — requires those N passes to occur before the system gives up. A family with no internet presence might consume 5 futile P1 passes (and their associated token cost) before being marked as converged. Meanwhile, family_50, which might be data-rich and easy to process, sits untouched.']}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"No cross-family learning."})," Family_100's processing doesn't benefit from anything learned while processing families 1-99. If you had built a population index from those 99 families, it could contain the shared employer, the common school, the mutual affiliation that would unlock family_100's connections. But DFS doesn't build that index until every family is done — it processes the population as independent units rather than as a connected system."]}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Poor parallelization."})," DFS is inherently sequential across families. In the strict model, you cannot start family_2 until family_1 is complete. You can parallelize ",(0,s.jsx)("em",{children:"within"})," a family to some extent — enriching multiple members simultaneously, running independent P2 agents in parallel — but the discovery→enrichment dependency chain limits the achievable parallelism. A family with 5 members might support 3-4 concurrent agents; a family with 2 members supports essentially none."]}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Unpredictable runtime."})," BFS has predictable per-phase runtime: N families × 1 agent invocation per family × average invocation time. DFS has wildly variable per-family runtime: a sparse family finishes in seconds, a rich one might take minutes. This makes capacity planning and progress estimation difficult. How long until the pipeline completes? With BFS, you can estimate after the first depth level. With DFS, you can't estimate until you've seen a representative sample of family complexities."]}),(0,s.jsx)("div",{className:"section-divider",children:"The Hybrid Approach"}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"Hybrid: Bounded BFS + Prioritized DFS"}),(0,s.jsxs)("p",{children:["Neither pure BFS nor pure DFS is optimal for Architecture_V1. The hybrid approach that fits the architecture best interleaves them in four phases, each building on the previous phase's output. The design principle is: ",(0,s.jsx)("strong",{children:"use BFS for coverage and index-building, then use DFS for depth on the families where depth is most valuable."})]}),(0,s.jsxs)("div",{className:"flow-step",children:[(0,s.jsxs)("div",{className:"flow-step-box",children:[(0,s.jsx)("div",{className:"flow-step-label",children:"Phase 1"}),(0,s.jsx)("div",{className:"flow-step-text",children:"BFS: shallow P1 discovery across all students"})]}),(0,s.jsxs)("div",{className:"flow-step-box",children:[(0,s.jsx)("div",{className:"flow-step-label",children:"Phase 2"}),(0,s.jsx)("div",{className:"flow-step-text",children:"BFS: P2 enrichment, reconcile, build index"})]}),(0,s.jsxs)("div",{className:"flow-step-box",children:[(0,s.jsx)("div",{className:"flow-step-label",children:"Phase 3"}),(0,s.jsx)("div",{className:"flow-step-text",children:"DFS: deep dive on top-K families"})]}),(0,s.jsxs)("div",{className:"flow-step-box",children:[(0,s.jsx)("div",{className:"flow-step-label",children:"Phase 4"}),(0,s.jsx)("div",{className:"flow-step-text",children:"BFS: re-sweep with population context"})]})]}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Phase 1: Shallow Discovery"}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Phase 1"})," runs a single P1 pass on every seed student. Every family gets a cold_start agent invocation. After this phase, you know the basic family structure for every student: who their parents are, whether they have siblings, rough member count. You also discover family overlaps — when two seed students share a family member — which triggers reconciliation before Phase 2."]}),(0,s.jsx)("p",{children:"Phase 1 is embarrassingly parallel. Every student's P1 invocation is independent. You can run all N simultaneously, bounded only by API rate limits and the concurrency semaphore from Chapter 3's dispatch loop. For a population of 500 students with a concurrency limit of 20, Phase 1 completes in roughly 500/20 × average_invocation_time ≈ 25 batches × ~10 seconds ≈ 4-5 minutes. This is fast enough that you can observe the results before committing to the next phase."}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Phase 2: Enrichment + Index Construction"}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Phase 2"})," runs P2 enrichment across all families, using either per-member or whole-family mode depending on the mode selection logic from Chapter 3. After enrichment completes, two things happen. First, family reconciliation runs: overlapping families discovered in Phase 1 are merged. Second, the population index is built (or rebuilt) from all family_files. After Phase 2, you have a shallow but complete view of the entire population — every member has been touched by both P1 and P2, and the population index contains employer, school, location, and affiliation data across all families."]}),(0,s.jsx)("p",{children:"Phase 2 is also highly parallel, with one caveat: families that were flagged for reconciliation must be merged before their P2 agents run, because the P2 whole-family mode needs the complete merged family_file as input. The dispatch system handles this naturally through dependencies — the P2 work units for a reconciled family depend on the reconciliation work unit completing first."}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Phase 3: Prioritized Deep Dive"}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Phase 3"})," is where the hybrid shines, and where it differs most from both pure BFS and pure DFS. Instead of DFS on all N families (expensive, and wasteful for families with sparse data), you rank families by their estimated information yield and DFS only on the top K. The ranking is informed by Phase 2's data — you're making an evidence-based decision about which families deserve the expensive deep treatment."]}),(0,s.jsxs)("p",{children:["The ranking function scores families on several dimensions. ",(0,s.jsx)("strong",{children:"Sparsity with potential"}),": a family with many members but low fill rates has room to grow — there's data out there, we just haven't found it yet. ",(0,s.jsx)("strong",{children:"Unresolved references"}),": if a family member's enrichment data mentions names not in the family_file, those are discovery targets waiting to be followed. ",(0,s.jsx)("strong",{children:"Cross-family connections"}),": families with members who share employers, schools, or affiliations with other families in the population are more likely to yield interesting connections during deep exploration. ",(0,s.jsx)("strong",{children:"Member count"}),": larger families have more surface area for discovery, and each new member found might connect to yet more members."]}),(0,s.jsx)(t8,{label:"Family ranking function for Phase 3",children:(0,s.jsx)("div",{className:"code-block","data-lang":"python",children:`def rank_families_by_potential(family_files, population_index) -> list[str]:
    scores = {}
    for family_id, ff in family_files.items():
        score = 0.0
        # Sparsity: room to grow
        score += (1 - ff.fill_ratio()) * 10
        # Unresolved references: discovery targets
        score += ff.count_unresolved_references() * 3
        # Cross-family connections: population value
        score += population_index.count_connections(family_id) * 2
        # Member count: surface area
        score += min(ff.member_count, 10) * 1.5
        scores[family_id] = score
    return sorted(scores, key=scores.get, reverse=True)`})}),(0,s.jsx)("p",{children:"K (the number of families selected for deep dive) is a configuration parameter. Setting K too low means you miss data-rich families. Setting K too high means you're essentially doing DFS on the full population, with all of DFS's disadvantages. A good heuristic is the top 10-20% of families by potential score, or a fixed number like 50 — whichever is smaller. The right value depends on your total token budget and the population's data distribution, both of which you can estimate after Phases 1 and 2."}),(0,s.jsx)("p",{children:"The DFS within Phase 3 follows the convergence criteria from Chapter 3: per-family token budget, information gain threshold, and maximum depth. Each deep-dive family gets its own generous budget (larger than the BFS per-family allocation) and runs the full P1→P2→feedback→P1 loop until convergence. Phase 3 families are processed sequentially (or with limited parallelism), because each family's DFS requires sustained context and rapid feedback loops that don't parallelize well."}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Phase 4: Context-Aware Re-Sweep"}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Phase 4"})," is the payoff of the entire hybrid approach. After Phase 3, the population index has been enriched with deep data from the DFS families. These families' career histories, affiliations, trust structures, and internet accounts are now in the index. Phase 4 runs P1 re-discovery across the population with this enriched population context injected into the agents' prompts and toolsets."]}),(0,s.jsxs)("p",{children:["The P1 agents in Phase 4 are different from Phase 1's cold_start agents. They use the ",(0,s.jsx)("code",{className:"code-inline",children:"cross_reference"})," or ",(0,s.jsx)("code",{className:"code-inline",children:"enrichment_aware_discovery"})," agent (depending on the policy selector's evaluation of each those files overlap and should be merged.'}),(0,s.jsx)("p",{children:"Overlapping families are grouped using Union-Find (disjoint set union), a data structure that efficiently groups elements connected by shared members. If family_A and family_B share Robert Chen, and family_B and family_C share Mei Chen, Union-Find groups all three into a single merge group. Each group is merged into a single family_file: the file with the most data is chosen as the primary, and the others' members, edges, and processing history are merged into it using the same delta-based merge logic from Chapter 6. The secondary files are deleted (or archived, depending on your retention policy)."}),(0,s.jsx)("p",{children:"Reconciliation should run after every BFS phase, and after Phase 1 in the hybrid approach. It's computationally cheap — the inverted index scan is O(total members across all files), and Union-Find operations are effectively O(1) amortized per merge. The actual file merge is more expensive (loading, merging, and writing JSON files) but only applies to overlapping families, which are typically a small fraction of the population — perhaps 5-15% for a population drawn from the same university class year."}),(0,s.jsx)(t8,{label:"Union-Find reconciliation",children:(0,s.jsx)("div",{className:"code-block","data-lang":"python",children:`class FamilyReconciler:
    def reconcile(self, family_files: dict[str, FamilyFile]) -> dict[str, FamilyFile]:
        # Build member \u{2192} family_id index
        member_index: dict[str, list[str]] = defaultdict(list)
        for fid, ff in family_files.items():
            for member_id in ff.members:
                member_index[member_id].append(fid)

        # Union-Find to group overlapping families
        uf = UnionFind()
        for member_id, fids in member_index.items():
            if len(fids) > 1:
                for fid in fids[1:]:
                    uf.union(fids[0], fid)

        # Merge each group into a primary file
        merged = {}
        consumed = set()
        for group in uf.groups():
            primary = max(group, key=lambda fid: family_files[fid].member_count)
            for secondary in group:
                if secondary != primary:
                    family_files[primary] = merge_family_files(
                        family_files[primary], family_files[secondary]
                    )
                    consumed.add(secondary)
            merged[primary] = family_files[primary]

        # Add un-merged families
        for fid, ff in family_files.items():
            if fid not in merged and fid not in consumed:
                merged[fid] = ff
        return merged`})}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"The Population Index"}),(0,s.jsx)("p",{children:'The population index is a lightweight inverted index that supports cross-family queries. It maps field values to member references: "Goldman Sachs" → [Alice Chen in Family_12, Bob Park in Family_37]. The index covers employers, schools, locations, names, and affiliations — the five dimensions most likely to reveal inter-family connections.'}),(0,s.jsx)("p",{children:"The index is rebuilt from scratch after each phase transition in the hybrid approach. Rebuilding is cheap — it scans all family_files and extracts the indexed fields, producing a fresh, consistent snapshot of the population's data. Incremental updates are possible but introduce complexity (what if a merge overwrites an indexed value?) that isn't worth it when the full rebuild takes under a second for a population of 500 families."}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Value normalization"}),' is the index\'s most important quality factor. "Goldman Sachs," "Goldman Sachs Group," "Goldman Sachs & Co.," and "GS" should all map to the same entry. The normalizer lowercases, strips common corporate suffixes (Inc., Corp., LLC, Group, & Co.), and applies a small dictionary of known aliases. Perfect normalization is impossible — there will always be edge cases — but the common cases must be handled to avoid missing obvious connections. For the MVP, a hand-maintained alias dictionary of the top 50-100 employers and schools in the population is sufficient. Post-MVP, the alias dictionary can be learned from the data itself (by clustering similar values using edit distance or embeddings).']}),(0,s.jsxs)("p",{children:["The index is queried in two contexts. The ",(0,s.jsx)("code",{className:"code-inline",children:"cross_reference"}),' P1 agent (post-MVP) queries it during discovery to find potential family connections across the population. The population context injection system (Chapter 8) queries it to build the context section that\'s injected into agent prompts during Phase 4 re-sweeps. In both cases, the query interface is simple: given a field name and a value, return all member references that match. The index also supports a "count connections" query: given a family_id, how many other families share at least one indexed value? This powers the Phase 3 ranking function.']}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"Convergence and Termination"}),(0,s.jsx)("p",{children:"Both BFS and DFS need termination conditions, and they operate at three nested levels. Getting termination wrong means either wasting tokens on futile exploration (terminating too late) or leaving easy data on the table (terminating too early). The art is in calibrating the thresholds, and the right values depend on empirical observation of the pipeline's behavior on your specific population."}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Per-Agent Termination"}),(0,s.jsx)("p",{children:"The lowest level. The agent loop (Chapter 5) stops when: the model emits an end-of-turn signal (it decides it has a complete answer), the iteration cap is reached (a hard safety limit that prevents runaway agents), or an unrecoverable error occurs. Per-agent termination is mechanical — it's built into the agent loop and doesn't require policy-level judgment."}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Per-Family Termination"}),(0,s.jsxs)("p",{children:['A family is "done" for the current pass when any of these conditions are met. ',(0,s.jsx)("strong",{children:"All members processed:"})," every member at the current depth has had their work unit dispatched and completed (or skipped). ",(0,s.jsx)("strong",{children:"No new targets:"})," the feedback gate (Chapter 2) returns an empty list — there are no undiscovered members to pursue. ",(0,s.jsx)("strong",{children:"Budget exhausted:"})," the family's token budget from Chapter 3 is depleted. ",(0,s.jsx)("strong",{children:"Information gain below threshold:"})," the ratio of new fields filled to tokens spent has dropped below a configurable minimum. This last condition is the most nuanced — set the threshold too low and the system wastes tokens on marginal improvements; set it too high and it misses easy fields that happen to require a few extra iterations to find."]}),(0,s.jsx)("p",{children:"For the MVP, a pragmatic approach: terminate when the feedback gate returns empty OR when 3 consecutive agent invocations produce zero new fields. This is simple, observable, and conservative. Tune the threshold empirically once you have telemetry data from real runs."}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Per-Population Termination"}),(0,s.jsx)("p",{children:'The highest-level decision. The entire traversal stops when: all families have reached a terminal state (converged, skipped, or budget-exhausted), the global token budget is depleted, the time limit is reached, or the marginal gain across the last complete phase has dropped below a population-level threshold. For the MVP with the hybrid approach, the simplest termination condition is completing all four phases — Phase 4\'s end is the natural stopping point. More sophisticated termination (e.g., "stop Phase 4 early if the re-sweep is producing less than 1 new field per family") requires the telemetry infrastructure from Chapter 8.'}),(0,s.jsxs)("div",{className:"callout-rose callout",children:[(0,s.jsx)("strong",{children:"Checkpointing"}),(0,s.jsx)("p",{className:"mt-2 mb-0",children:"For long-running traversals (hours for large populations), you need the ability to stop and resume. BFS checkpointing is straightforward: serialize which depth level you're on and which items are complete. DFS checkpointing requires saving the internal stack state per-family. The hybrid approach benefits from phase boundaries as natural checkpoints — you can stop between any two phases and resume cleanly. Implement serializable checkpoint objects from the start, even if you don't use them immediately in the MVP. Retrofitting checkpointing onto a running system is painful, and you will need it the first time a 3-hour run crashes at the 2-hour mark."})]}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"Choosing a Strategy"}),(0,s.jsxs)("table",{children:[(0,s.jsx)("thead",{children:(0,s.jsxs)("tr",{children:[(0,s.jsx)("th",{children:"Dimension"}),(0,s.jsx)("th",{children:"BFS"}),(0,s.jsx)("th",{children:"DFS"}),(0,s.jsx)("th",{children:"Hybrid"})]})}),(0,s.jsxs)("tbody",{children:[(0,s.jsxs)("tr",{children:[(0,s.jsx)("td",{children:"Coverage speed"}),(0,s.jsx)("td",{children:"Fast — all families touched early"}),(0,s.jsx)("td",{children:"Slow — sequential across families"}),(0,s.jsx)("td",{children:"Medium — BFS phases first"})]}),(0,s.jsxs)("tr",{children:[(0,s.jsx)("td",{children:"Per-family depth"}),(0,s.jsx)("td",{children:"Shallow — uniform across all"}),(0,s.jsx)("td",{children:"Deep — exhaustive per family"}),(0,s.jsx)("td",{children:"Configurable — deep for top-K"})]}),(0,s.jsxs)("tr",{children:[(0,s.jsx)("td",{children:"Cross-family learning"}),(0,s.jsx)("td",{children:"After each full depth level"}),(0,s.jsx)("td",{children:"None until all done"}),(0,s.jsx)("td",{children:"After Phase 2, used in Phase 4"})]}),(0,s.jsxs)("tr",{children:[(0,s.jsx)("td",{children:"Parallelization"}),(0,s.jsx)("td",{children:"Excellent"}),(0,s.jsx)("td",{children:"Poor across families"}),(0,s.jsx)("td",{children:"Phase-dependent"})]}),(0,s.jsxs)("tr",{children:[(0,s.jsx)("td",{children:"Token efficiency"}),(0,s.jsx)("td",{children:"Low — uniform depth wastes on sparse"}),(0,s.jsx)("td",{children:"Mixed — efficient on rich, wasteful on sparse"}),(0,s.jsx)("td",{children:"Highest — prioritized allocation"})]}),(0,s.jsxs)("tr",{children:[(0,s.jsx)("td",{children:"Family overlap han vel abstraction in the system. It wraps the HTTP API for a specific provider (Anthropic, OpenAI, Google) and exposes a consistent interface: given a system prompt, messages, and tool definitions, make the API call and return a structured response. The client handles retry logic, rate limiting, and response parsing — concerns that no other component in the system should need to think about. When the agent loop calls ",(0,s.jsx)("code",{className:"code-inline",children:"client.create_message()"}),", it should be as reliable as calling a local function: either it returns a valid response or it raises an exception. The transient failures of distributed systems — network timeouts, rate limits, server overload — are the client's problem, not the caller's."]}),(0,s.jsxs)("p",{children:["The key design principle is ",(0,s.jsx)("strong",{children:"provider-agnosticism at the call site"}),". The agent loop, the policy selector, and the tool registry all interact with an abstract ",(0,s.jsx)("code",{className:"code-inline",children:"LLMClient"})," interface that defines the contract: system prompt, messages, tools, and configuration in; structured response out. The concrete implementation — ",(0,s.jsx)("code",{className:"code-inline",children:"AnthropicClient"}),", ",(0,s.jsx)("code",{className:"code-inline",children:"OpenAIClient"}),", or a future ",(0,s.jsx)("code",{className:"code-inline",children:"OllamaClient"})," for local models — handles provider-specific details: different API endpoints, different request body schemas (Anthropic uses ",(0,s.jsx)("code",{className:"code-inline",children:"system"})," as a top-level field; OpenAI uses it as a message role), different response formats (Anthropic returns content blocks with type discrimination; OpenAI returns a single message with optional tool_calls), and different rate limit headers."]}),(0,s.jsxs)("p",{children:["Swapping providers means changing a single configuration value in the AgentConfig, not rewriting agent code. This matters because model selection is a policy-level decision (Chapter 1): different agents might use different providers or different models from the same provider. The cold_start agent might use Claude Haiku (fast, cheap) while the cross-reference agent uses Claude Sonnet (more capable). The client abstraction makes this routing invisible to the agent loop — it just calls ",(0,s.jsx)("code",{className:"code-inline",children:"client.create_message()"})," and gets back a provider-agnostic ",(0,s.jsx)("code",{className:"code-inline",children:"LLMResponse"})," object."]}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Response Parsing"}),(0,s.jsxs)("p",{children:["The client's response parser translates provider-specific response formats into a unified ",(0,s.jsx)("code",{className:"code-inline",children:"LLMResponse"}),' object. This object contains: the text content (if any), a list of tool calls (if any), the stop reason (why the model stopped generating — "end_turn" means the model is done, "tool_use" means it wants to call a tool), token usage (input and output token counts, essential for budget tracking), and the raw response (preserved for debugging and telemetry). The parser handles the provider-specific quirks: Anthropic\'s content is a list of blocks that may interleave text and tool_use; OpenAI\'s content is a single message with a separate tool_calls field. The agent loop sees the same structure regardless of provider.']}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Retry Logic"}),(0,s.jsxs)("p",{children:["The client's retry logic handles two classes of transient failures that are routine in production LLM usage. ",(0,s.jsx)("strong",{children:"Rate limiting"})," (HTTP 429): the API returns a ",(0,s.jsx)("code",{className:"code-inline",children:"retry-after"})," header indicating how long to wait. The client sleeps for the indicated duration, then retries. This is deterministic — the API tells you exactly when to try again. ",(0,s.jsx)("strong",{children:"Overload"}),' (HTTP 529 for Anthropic, HTTP 503 for others): the server is temporarily overloaded and can\'t process the request. The client uses exponential backoff — 1 second, 2 seconds, 4 seconds — up to a maximum of 3 retries. If all retries fail, the client raises an exception that propagates to the agent loop, which records the failure and transitions the work unit to the "failed" state.']}),(0,s.jsxs)("p",{children:["Both retry strategies are invisible to the calling code. From the agent loop's perspective, ",(0,s.jsx)("code",{className:"code-inline",children:"client.create_message()"})," either returns a valid response (possibly after some transparent waiting) or raises an exception. The loop doesn't need to implement its own retry logic, and it doesn't need to know whether the response took 2 seconds (no retries) or 30 seconds (two rate-limit waits). This encapsulation is important because retry behavior is a concern of the transport layer, not the application layer."]}),(0,s.jsx)(t9,{label:"LLM client abstract interface and Anthropic implementation",children:(0,s.jsx)("div",{className:"code-block","data-lang":"python",children:`class LLMClient(ABC):
    @abstractmethod
    async def create_message(
        self, model: str, system: str, messages: list[dict],
        tools: list[ToolDefinition] | None = None,
        max_tokens: int = 4096, temperature: float = 0.0,
    ) -> LLMResponse: ...

class AnthropicClient(LLMClient):
    def __init__(self, api_key: str):
        self.http = httpx.AsyncClient(
            base_url="https://api.anthropic.com",
            headers={"x-api-key": api_key, "anthropic-version": "2023-06-01"},
            timeout=httpx.Timeout(connect=10, read=120),
        )
        self._rate_limiter = TokenBucketRateLimiter(rpm=50, tpm=40_000)

    async def create_message(self, **kwargs) -> LLMResponse:
        await self._rate_limiter.acquire(kwargs.get("max_tokens", 4096))
        payload = self._build_payload(**kwargs)

        for attempt in range(3):
            resp = await self.http.post("/v1/messages", json=payload)
            if resp.status_code == 429:
                await asyncio.sleep(float(resp.headers.get("retry-after", 2**attempt)))
                continue
            if resp.status_code == 529:
                await asyncio.sleep(2 ** attempt)
                continue
            resp.raise_for_status()
            return self._parse_response(resp.json())
        raise MaxRetriesExceeded()`})}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Rate Limiting"}),(0,s.jsx)("p",{children:"LLM APIs enforce both requests-per-minute and tokens-per-minute limits, and both must be respected simultaneously. A naive client that fires requests as fast as the agent loop runs will hit these limits within seconds during BFS phases, when dozens of agents are running concurrently through the dispatch loop from Chapter 3."}),(0,s.jsxs)("p",{children:["The rate limiter is a ",(0,s.jsx)("strong",{children:"dual token bucket"}),": one bucket for requests (refills at RPM/60 tokens per second), one bucket for tokens (refills at TPM/60 per second). Both buckets must have capacity before a request proceeds. If either bucket is empty, the client blocks asynchronously (using ",(0,s.jsx)("code",{className:"code-inline",children:"asyncio.sleep"}),") until capacity is available. The blocking is non-disruptive — other coroutines in the event loop continue executing, so other agents can make progress while one agent waits for rate limit capacity."]}),(0,s.jsxs)("p",{children:["The token bucket requires an estimate of how many tokens the request will consume, which you don't know precisely until the response arrives. The strategy is to reserve ",(0,s.jsx)("code",{className:"code-inline",children:"max_tokens"})," (the maximum possible output) at request time, then refund the difference between the reservation and the actual usage after the response arrives. This is pessimistic — the system may run slightly slower than necessary because it's reserving more capacity than it uses — but it guarantees the rate limit is never exceeded. The alternative (estimate based on historical averages) risks bursts that trigger 429 responses, which are more expensive than the slight under-utilization of the pessimistic approach."]}),(0,s.jsx)("div",{className:"section-divider",children:"Tool System"}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"The Tool Registry"}),(0,s.jsx)("p",{children:"Tools are the bridge between the LLM's reasoning and the outside world. The model can think, but it can't act — it can decide that it needs to search for \"Robert Chen Goldman Sachs,\" but it can't execute that search. Tools are Python functions that the model can invoke by name, with arguments, to perform actions and observe results. The tool registry is the central place where these functions are defined, stored, and resolved."}),(0,s.jsxs)("p",{children:["When the policy's config builder specifies a list of tool names for an agent (e.g., ",(0,s.jsx)("code",{className:"code-inline",children:'["web_search", "merge_member", "read_family_file"]'}),"), the registry resolves those names to two things: the JSON schemas that tell the LLM what the tools do and how to call them (sent as part of the API request), and the handler functions that execute the tools when the LLM invokes them (called by the agent loop when a tool_use response is received). This dual resolution — schema for the LLM, handler for the runtime — is the registry's core responsibility."]}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Tool Definition Anatomy"}),(0,s.jsx)("p",{children:"Each tool definition has six components, each serving a distinct purpose in the system."}),(0,s.jsxs)("p",{children:["The ",(0,s.jsx)("strong",{children:"name"})," must be concise, descriptive, and unique. The model reads it to decide which tool to call. Use verb_noun format: ",(0,s.jsx)("code",{className:"code-inline",children:"web_search"}),", ",(0,s.jsx)("code",{className:"code-inline",children:"read_family_file"}),", ",(0,s.jsx)("code",{className:"code-inline",children:"merge_member"}),". Avoid generic names like ",(0,s.jsx)("code",{className:"code-inline",children:"search"})," (search what?) or ",(0,s.jsx)("code",{className:"code-inline",children:"update"})," (update what?)."]}),(0,s.jsxs)("p",{children:["The ",(0,s.jsx)("strong",{children:"description"}),' is the single most important field — it\'s the prompt that teaches the model when and how to use the tool. Write descriptions as if you\'re explaining the tool to a competent colleague who has never seen your codebase. Include the tool\'s purpose ("Search the web for information about a person"), its input expectations ("Use specific queries: include full name plus school, company, or location"), and any caveats ("Returns top 5 results with snippets; results may be stale or inaccurate"). The quality of the description directly determines how effectively the model uses the tool. A vague description produces vague tool usage.']}),(0,s.jsxs)("p",{children:["The ",(0,s.jsx)("strong",{children:"parameters_schema"})," is a JSON Schema object that defines the tool's inputs. This is what the model fills out when making a tool call — the schema constrains what the model can provide. Use enums for fields with fixed valid values (relationship types, field categories). Mark only truly required fields as required; optional fields with sensible defaults let the model skip what isn't relevant, reducing the chance of the model fabricating a value just to satisfy a required field. Nest sparingly — deep nesting increases the chance of malformed output."]}),(0,s.jsxs)("p",{children:["The ",(0,s.jsx)("strong",{children:"handler"})," is the async Python function that implements the tool. It receives the arguments the model provided, performs the action, and returns the result. The handler must be defensive: validate inputs (the model might provide unexpected argument types or values despite the schema), handle errors gracefully (a web search might time out or return no results), and produce output that the model can usefully interpret (structured JSON, not raw HTML)."]}),(0,s.jsxs)("p",{children:["The ",(0,s.jsx)("strong",{children:"timeout"})," caps how long the handler can run. Web searches might take 5-10 seconds; file reads should be sub-second. A handler that exceeds its timeout returns a timeout error to the model, which can then decide to retry with different arguments or move on. Without a timeout, a hung handler blocks the entire agent loop."]}),(0,s.jsxs)("p",{children:["The ",(0,s.jsx)("strong",{children:"max_retries"})," controls how many times a failed handler is retried before returning the error to the model. For transient failures (network timeouts), 2 retries is reasonable. For deterministic failures (invalid arguments), 0 retries is correct — retrying won't help."]}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Tool Categories for Architecture_V1"}),(0,s.jsx)("p",{children:"The tools fall into three categories that map cleanly to the system's data flow."}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Read tools"})," extract data without side effects. ",(0,s.jsx)("code",{className:"code-inline",children:"read_family_file"})," returns the current state of a family. ",(0,s.jsx)("code",{className:"code-inline",children:"read_member_data"})," returns full personal_data for a specific member (used with the summary-plus-detail-on-demand context strategy from Chapter 7). These tools are pure — they don't modify any state, they're safe to call any number of times, and they're safe to call concurrently. They're the agent's eyes."]}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Write tools"})," modify the family_file. ",(0,s.jsx)("code",{className:"code-inline",children:"merge_member"})," adds a discovered family member with confidence and evidence. ",(0,s.jsx)("code",{className:"code-inline",children:"update_personal_data"})," writes enrichment deltas. These tools enforce the append-only invariant from Chapter 6 — they validate that no input attempts to delete or null out existing data, and they use the merge strategy (confidence-wins or flag-all) configured for the current policy. Write tools acquire the per-family lock before modifying the file, ensuring concurrent agents don't corrupt each other's writes. They're the agent's hands."]}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Search tools"})," retrieve information from external sources. ",(0,s.jsx)("code",{className:"code-inline",children:"web_search"})," queries a search engine and returns results with snippets. ",(0,s.jsx)("code",{className:"code-inline",children:"query_population_index"})," (post-MVP) searches the population index for cross-family connections. Search tools are the most expensive in terms of latency (seconds per call) and the most variable in terms of result quality (a search might return exactly what you need, or nothing useful, or misleading information). They're the agent's legs — they go out into the world and bring back what they find."]}),(0,s.jsxs)("div",{className:"callout",children:[(0,s.jsx)("strong",{children:"Tool Schema Design Principles"}),(0,s.jsxs)("p",{className:"mt-2 mb-0",children:[(0,s.jsx)("strong",{children:"Descriptions are prompts."})," They're the primary mechanism the model uses to decide which tool to call and how. Be precise and include usage guidance. ",(0,s.jsx)("strong",{children:"Constrain with enums."})," If a parameter has a fixed set of valid values, declare them — this reduces model errors dramatically. ",(0,s.jsx)("strong",{children:"Require only what's essential."})," Optional fields with sensible defaults let the model skip irrelevant parameters. ",(0,s.jsx)("strong",{children:"Nest sparingly."})," Deep nesting increases malformed output probability. ",(0,s.jsx)("strong",{children:"Include examples in descriptions"})," when the expected format is non-obvious: \"Query should be specific: 'John Smith MIT 2024' not 'John Smith'.\""]})]}),(0,s.jsx)(t9,{label:"Example tool definitions for Architecture_V1",children:(0,s.jsx)("div",{className:"code-block","data-lang":"python",children:`web_search = ToolDefinition(

s arguments, which you parse directly into your Pydantic model."]}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Pydantic Schema Generation"}),(0,s.jsxs)("p",{children:["Define your output schemas as Pydantic models and auto-generate the JSON Schema for tool definitions. This gives you three things for free: the JSON Schema for the LLM (via ",(0,s.jsx)("code",{className:"code-inline",children:"model_json_schema()"}),"), type-safe parsing with validation (via ",(0,s.jsx)("code",{className:"code-inline",children:"model_validate()"}),"), and clear error messages when validation fails (Pydantic tells you exactly which field violated which constraint). The Pydantic model is the single source of truth for what the output looks like — you define it once, and both the LLM's schema constraints and your parsing logic derive from it."]}),(0,s.jsx)(t9,{label:"Pydantic output schema example",children:(0,s.jsx)("div",{className:"code-block","data-lang":"python",children:`from pydantic import BaseModel, Field
