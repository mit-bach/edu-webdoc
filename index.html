ics and cross-referencing checks that the schema alone can't enforce. This is one of the key reasons gates exist between chain links: they're the semantic validation layer."]}),(0,s.jsx)("div",{className:"section-divider",children:"The Agent Loop"}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"The Complete Agent Loop"}),(0,s.jsx)("p",{children:"The agent loop is the generic executor that runs any agent configuration. It's parameterized by the AgentConfig (from Chapter 1), the PolicyState, the LLM client, and the tool registry. The loop itself is model-agnostic, tool-agnostic, and policy-agnostic — it's pure infrastructure. The same loop runs a cold_start P1 agent with Haiku and 3 tools, and a whole_family P2 agent with Sonnet and 5 tools. The behavior difference comes entirely from the config, not from the loop."}),(0,s.jsx)("p",{children:"The loop's structure is deceptively simple: render the system prompt from the config's template and the policy state. Resolve the tool schemas from the config's tool list. Construct the initial user message from the state. Then iterate. Each iteration makes one LLM call. If the model returns tool calls (stop_reason is \"tool_use\"), execute them through the registry and append the results to the message history. If the model returns an end-of-turn, parse the output using the config's output schema and return the result. If the iteration cap is reached without a final answer, return a partial result."}),(0,s.jsxs)("p",{children:["Between iterations, two maintenance operations occur. The message manager's ",(0,s.jsx)("code",{className:"code-inline",children:"compact_if_needed"})," method (Chapter 7) checks whether the conversation history is approaching the context budget and compacts it if necessary. And the trace recorder logs the iteration's metrics: token usage, tool calls (names and statuses), and duration. This per-iteration telemetry feeds into the chain trace (Chapter 2's instrumentation) and the skill system's invocation records (Chapter 8)."]}),(0,s.jsx)(t9,{label:"Complete agent loop implementation",children:(0,s.jsx)("div",{className:"code-block","data-lang":"python",children:`async def run_agent(config: AgentConfig, state: PolicyState,
                    client: LLMClient, registry: ToolRegistry) -> AgentResult:
    system_prompt = render_prompt(config.prompt_template, state)
    tool_schemas = registry.get_schemas(config.tools)
    messages = MessageManager(max_context_tokens=config.context_budget)
    messages.add_user(build_initial_message(state))
    trace = AgentTrace(agent=config.agent, family_id=state.family_id)

    for iteration in range(config.max_iterations):
        trace.start_iteration()
        messages.compact_if_needed()

        response = await client.create_message(
            model=config.model, system=system_prompt,
            messages=messages.to_list(), tools=tool_schemas,
            max_tokens=config.token_budget, temperature=config.temperature,
        )
        trace.record_llm_call(response.usage)
        messages.add_assistant(response)

        # Case 1: Model wants to use tools
        if response.stop_reason == "tool_use" and response.tool_calls:
            results = []
            for tc in response.tool_calls:
                result = await registry.execute(tc.name, tc.arguments)
                result.tool_call_id = tc.id
                results.append(result)
                trace.record_tool_call(tc.name, result.status)
            messages.add_tool_results(results)
            continue

        # Case 2: Model finished
        if response.stop_reason == "end_turn":
            trace.finish("completed")
            if response.tool_calls:
                parsed = parse_structured_output(response, config.output_schema, client)
                return AgentResult(status="success", data=parsed, trace=trace)
            return AgentResult(status="success", text=response.text, trace=trace)

    # Case 3: Hit iteration limit
    trace.finish("max_iterations")
    return AgentResult(status="max_iterations", trace=trace)`})}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"System Prompt Engineering"}),(0,s.jsx)("p",{children:'System prompts are parameterized templates — not static strings, but dynamic documents that incorporate context from the PolicyState. The template defines the agent\'s role ("You are a family research agent"), its rules of engagement ("Do NOT guess; only include candidates with concrete evidence"), the expected output format (implicitly defined by the output tool\'s schema, but worth restating in natural language for emphasis), and contextual data injected from the state (the target\'s name, the family_file summary, the pass number, the requested fields).'}),(0,s.jsxs)("p",{children:["The most impactful section of the system prompt is the ",(0,s.jsx)("strong",{children:"confidence guidelines"}),". Without explicit guidance, models assign confidence scores erratically — either over-confident (everything is 0.9+, even guesses) or unhelpfully uniform (everything is 0.5, giving the merge function no signal to resolve conflicts). The prompt should define what each range means in concrete terms. A 0.9+ confidence requires direct evidence from a reliable source: the person is named as a family member in a news article, institutional profile, or official document. A 0.7-0.9 requires strong circumstantial evidence: same last name, same location, plausible age range, and at least one independent corroborating signal. A 0.5-0.7 requires moderate evidence: shared last name with some contextual match but no strong corroboration. Below 0.5 should not be included — the merge function will accept it but the confidence is too low to be useful, and it pollutes the family_file with noise."]}),(0,s.jsxs)("p",{children:["Templates should also include ",(0,s.jsx)("strong",{children:"negative instructions"})," — telling the model what ",(0,s.jsx)("em",{children:"not"}),' to do is often more effective at preventing failures than telling it what to do. "Do NOT include public figures who happen to share the target\'s name unless there is specific evidence linking them to this family." "Do NOT fabricate email addresses, social media profiles, or other contact information." "Do NOT report a confidence above 0.8 unless you have at least two independent pieces of evidence." These constraints prevent the most common failure modes — hallucinated celebrities as family members, fabricated LinkedIn profiles, inflated confidence on single-source data — and are worth the 200-300 tokens they cost to include in every invocation.']}),(0,s.jsx)("p",{children:"Template parameterization is straightforward — Python f-strings or Jinja2 templates that substitute values from the PolicyState. The important discipline is to keep templates in a separate namespace (a templates directory, a dictionary, a config file) rather than embedding them in code. This makes templates reviewable, testable, and modifiable without changing Python logic. When you're debugging why an agent produced bad output, the first thing you'll want to inspect is the rendered prompt, and having it in a clean template makes that inspection easy."})]})},tag:"infra"},{id:"ch6",num:6,title:"State & Idempotency",subtitle:"family_file Ops & Merge Logic",component:function(){return(0,s.jsxs)("article",{className:"prose-body",children:[(0,s.jsx)("div",{className:"chapter-badge",children:"Chapter 06"}),(0,s.jsx)("h1",{className:"heading-display text-4xl mb-3",children:"State & Idempotency"}),(0,s.jsx)("p",{className:"text-lg mb-10",style:{color:"var(--text-tertiary)",fontFamily:"var(--font-body)"},children:"How the family_file maintains data integrity through append-only merges, deterministic identity, and conflict resolution — and why these choices determine whether your system is reliable or fragile."}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"The family_file as Source of Truth"}),(0,s.jsx)("p",{children:"Every mutation in the system flows through the family_file. Agents are stateless — they start each invocation with no memory of prior runs, no awareness of what other agents have done, no persistent connection to the data they previously produced. All durable state lives in the file. This means the family_file's design directly determines whether the system is reliable or fragile, whether it can recover from errors or silently accumulates corruption over many passes."}),(0,s.jsxs)("p",{children:["This is a deliberate architectural choice with important consequences. By making agents stateless and the file the single source of truth, we gain two properties that distributed systems engineers prize above almost all else. First, ",(0,s.jsx)("strong",{children:"recoverability"}),": if an agent crashes mid-execution, the family_file is either in its pre-execution state (the agent hadn't written yet) or in a valid post-execution state (the write completed). There is no intermediate corrupted state because writes are atomic. Second, ",(0,s.jsx)("strong",{children:"reproducibility"}),": given the same family_file and the same agent configuration, the agent will produce the same output. This makes debugging tractable — you can replay any agent invocation by feeding it the file state at that point in time."]}),(0,s.jsxs)("p",{children:["The family_file is a JSON document keyed by a deterministic family_id. It contains a map of ",(0,s.jsx)("code",{className:"code-inline",children:"member_id → personal_data"}),", a separate ",(0,s.jsx)("code",{className:"code-inline",children:"relationship_edges"})," array for inverse-aware links, and a ",(0,s.jsx)("code",{className:"code-inline",children:"processing_history"})," log that records every agent invocation that touched this file. The processing_history is essential for debugging and for the skill system (Chapter 8) — it tells you exactly what was tried, what worked, and what failed, and it provides the telemetry data that skill mining uses to discover effective agent-profile pairings."]}),(0,s.jsxs)("div",{className:"callout",children:[(0,s.jsx)("strong",{children:"Design Principle"}),(0,s.jsx)("p",{className:"mt-2 mb-0",children:"The family_file is not a database record. It is a self-contained document that carries its own history. Any reader can understand the file's provenance without querying external systems. This is a document-oriented design, not a relational one, and it makes the system resilient to infrastructure changes — you can move files between storage backends, archive them, ship them to another machine, and they remain fully self-describing."})]}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"Deterministic Identity"}),(0,s.jsx)("p",{children:"Family IDs and member IDs must be deterministic — the same family should always get the same ID regardless of when or in what order it's processed. This property eliminates an entire category of bugs related to duplicate creation, orphaned references, and non-reproducible behavior across runs. If you process the seed CSV today and again tomorrow, every family_file should have the same filename both times."}),(0,s.jsx)("p",{children:'For the MVP, the recommended approach is to derive the family_id from the seed student only — a SHA-256 hash of the normalized name plus class year, truncated to 16 hex characters. This is stable and unique enough: the seed student doesn\'t change, so the ID doesn\'t change when new members are discovered. Normalization is critical: lowercase the name, strip whitespace, use a consistent delimiter. Without normalization, "Alice Chen" and " alice  chen " would produce different hashes, creating duplicate family_files for the same person.'}),(0,s.jsxs)("p",{children:['The Architecture_V1 spec mentions a "hash of sorted member names + earliest class year" approach. This is better suited for ',(0,s.jsx)("em",{children:"deduplication and reconciliation"}),' — detecting when two independently-created family_files should be merged — but it creates a re-keying problem as a primary key. Every time you discover a new member, the hash changes, which invalidates all references to the old ID: in the dispatch queue, in the population index, in other family_files\' cross-references, and in the processing history. For the primary key, stability matters more than content-derivation. Use the content-based hash as a secondary "fingerprint" for merge detection, not as the primary identifier.']}),(0,s.jsx)("div",{className:"section-divider",children:"Merge Operations"}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"Delta-Based Merges"}),(0,s.jsxs)("p",{children:["Agents never output a complete family_file. They output ",(0,s.jsx)("em",{children:"deltas"})," — structured descriptions of what to add or augment. A delta specifies: which member, which fields, the new values, the confidence score for each value, and the source or evidence string. This delta-only approach has three advantages over full-file replacement."]}),(0,s.jsxs)("p",{children:["First, it enables ",(0,s.jsx)("strong",{children:"concurrent writes"}),". If two agents are enriching different members of the same family simultaneously, their deltas don't conflict — they touch different parts of the file. With full-file replacement, the second agent's write would overwrite the first agent's changes, a classic lost-update problem."]}),(0,s.jsxs)("p",{children:["Second, it makes the ",(0,s.jsx)("strong",{children:"append-only invariant"})," enforceable. The merge function can verify that no delta attempts to delete or null out an existing field. If a delta tries to set a field to null, the merge function rejects it. This is a compile-time guarantee (enforced by the delta schema) rather than a runtime hope."]}),(0,s.jsxs)("p",{children:["Third, it creates an ",(0,s.jsx)("strong",{children:"audit trail"}),". Each delta is a record of what an agent thought it found. By storing deltas alongside the merged result, you can reconstruct the full history of how each field got its current value — which agent set it, when, with what confidence, based on what evidence. This is invaluable for debugging and for the ablation studies described in Chapter 8."]}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"The Three Merge Cases"}),(0,s.jsx)("p",{children:"The merge function handles three cases for each field in the delta, and understanding the semantics of each case is essential for reasoning about system behavior."}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Case 1: New field"})," (existing value is null). Always accept — write the value, record the confidence and source in a metadata sidecar keyed by the field path. The metadata tracks confidence, source, and the timestamp of the last update. This case is unambiguous and constitutes the majority of merges on early passes."]}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Case 2: Identical value"})," (new value matches existing). This is a no-op for the value itself, but it carries information: if two independent agent runs, potentially using different search strategies and different evidence, arrive at the same value, our confidence that the value is correct should increase. The merge function boosts the confidence score by a diminishing increment — specifically, ",(0,s.jsx)("code",{className:"code-inline",children:"new_conf = old_conf + (1 - old_conf) × 0.2"}),". This formula has the property that it asymptotically approaches 1.0 but never reaches it, and each successive boost is smaller than the last, reflecting diminishing marginal evidence."]}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Case 3: Conflict"})," (new value differs from existing). This is where the merge strategy matters, and two strategies are supported. The ",(0,s.jsx)("strong",{children:"confidence-wins"})," strategy compares the new delta's confidence with the existing field's confidence. If the new value wins, it replaces the existing value, but the old value is archived in the metadata (never deleted — append-only). If the existing value wins, the new value is recorded as an attempted update in the processing history, providing evidence that there's disagreement about this field. The ",(0,s.jsx)("strong",{children:"flag-all"})," strategy never resolves the conflict automatically; it records both values and marks the field for human review. The MVP should use confidence-wins for most fields and flag-all for high-stakes fields like relationship types, which affect the graph structure and are expensive to correct after the fact."]}),(0,s.jsxs)("div",{className:"callout-green callout",children:[(0,s.jsx)("strong",{children:"Idempotency Proof"}),(0,s.jsxs)("p",{className:"mt-2 mb-0",children:["The merge function is idempotent: ",(0,s.jsx)("code",{className:"code-inline",children:"merge(state, delta) == merge(merge(state, delta), delta)"}),'. This holds because: new fields are set on first application and become "identical value" on second application (no-op with confidence boost). Conflicts are resolved on first application; the resolved value matches the delta on second application (no-op). The confidence boost on repeated no-ops converges asymptotically to 1.0, never diverges. This means you can safely re-run any agent on any family_file without fear of corruption — a property that enables the iterative multi-pass architecture described in Chapter 4.']})]}),(0,s.jsx)(t7,{label:"Merge strategy implementation sketch",children:(0,s.jsx)("div",{className:"code-block","data-lang":"python",children:`class FamilyFileMerger:
    def merge_personal_data(self, existing: dict, delta: PersonalDataDelta,
                            strategy: str = "confidence_wins") -> MergeResult:
        accepted, conflicts, no_ops = {}, [], []
        for field_path, new_value in delta.updates.items():
            existing_value = get_nested(existing, field_path)
            new_conf = delta.confidence.get(field_path, 0.5)
            
            if existing_value is None:             # Case 1: new field
                set_nested(existing, field_path, new_value)
                set_nested(existing, f"_meta.{field_path}.confidence", new_conf)
                accepted[field_path] = new_value
            elif existing_value == new_value:       # Case 2: identical
                old_conf = get_nested(existing, f"_meta.{field_path}.confidence", 0.5)
                boosted = min(1.0, old_conf + (1 - old_conf) * 0.2)
                set_nested(existing, f"_meta.{field_path}.confidence", boosted)
                no_ops.append(field_path)
            else:                                    # Case 3: conflict
                # ... resolve by strategy
                pass
        return MergeResult(accepted=accepted, conflicts=conflicts, no_ops=no_ops)`})}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"Shared-Asset Propagation"}),(0,s.jsx)("p",{children:"Certain personal_data fields are household-level — they belong to the family unit, not to an individual member. A primary residence, a family trust, a family business. When P2 enrichment discovers a shared asset for member A, that data should propagate bidirectionally to all linked members. If Robert Chen's enrichment reveals the family home address, that address should also appear in Alice Chen's and Brian Chen's personal_data without requiring a separate agent invocation for each."}),(0,s.jsxs)("p",{children:["This propagation is a distinct merge path from the standard per-member merge. The propagator examines each field in an incoming delta, checks whether the field is in the set of shared-asset fields, and if so, generates ",(0,s.jsx)("em",{children:"derived deltas"})," for all members linked to the source member through the relationship_edges. The derived delta is identical to the original except for two differences: the member_id points to the target member, and the confidence is multiplied by 0.9 (slightly reduced because the data is derived rather than directly observed). The \"linked members\" are determined by the field type: for primary_residence, it's household members (parents + children sharing the address); for trusts, it's listed beneficiaries; for family businesses, it's members tagged with the business affiliation."]}),(0,s.jsx)("p",{children:"Propagation must be carefully ordered relative to the standard merge. The flow is: apply the original delta to the source member first, then generate propagated deltas, then apply those to target members. This ordering ensures that the source member's data is authoritative and the propagated data is clearly derived. If propagation were to run before the source merge, you'd risk propagating stale or rejected values."}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"Relationship Edge Management"}),(0,s.jsxs)("p",{children:["Relationship edges are stored separately from personal_data and have their own invariants that are critical to the system's correctness. The most important invariant: edges are ",(0,s.jsx)("strong",{children:"inverse-aware"}),'. Adding "Robert parent_of Alice" automatically creates "Alice child_of Robert." Symmetric relationships (sibling_of, spouse_of) create their own inverses with the same confidence. This eliminates a large class of consistency bugs where one direction of a relationship exists but the other doesn\'t — bugs that are particularly insidious because they\'re invisible until you query the graph from the "wrong" direction.']}),(0,s.jsxs)("p",{children:["Edges also undergo ",(0,s.jsx)("strong",{children:"consistency validation"})," after each merge. The validator checks for: no member having more than 2 biological parents, no self-references (A parent_of A), no circular parentage (A parent_of B and B parent_of A), and no contradictory edges (A sibling_of B and A parent_of B simultaneously). These checks produce warnings, not errors — the system doesn't reject the data outright, because LLM-generated relationship data has a roughly 5-10% error rate on relationship types, and hard rejection would cause data loss. Instead, warnings are logged to the processing_history and flagged for review. In practice, most relationship errors are classification mistakes (labeling a sibling as a cousin, or a step-parent as a biological parent) rather than fabricated relationships."]}),(0,s.jsxs)("p",{children:["The deduplication logic for edges is based on the triple ",(0,s.jsx)("code",{className:"code-inline",children:"(source, target, relationship_type)"}),". If the same edge is added twice, the second addition boosts the confidence score rather than creating a duplicate. This mirrors the personal_data merge behavior: repeated observations increase confidence without creating data duplication."]}),(0,s.jsx)("div",{className:"section-divider",children:"Persistence"}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"File Format and I/O"}),(0,s.jsxs)("p",{children:["The MVP uses JSON files on the local filesystem. Each family_file is a single ",(0,s.jsx)("code",{className:"code-inline",children:".json"})," file named by the family_id. JSON is chosen over alternatives (Parquet, SQLite, Protocol Buffers) for three reasons: it's human-readable (you can open the file and inspect the data without any tooling), it's schema-flexible (adding new fields to personal_data doesn't require a migration), and it's natively supported by Python's standard library (no external dependencies)."]}),(0,s.jsxs)("p",{children:["The tradeoff is performance. JSON files are slower to read and write than binary formats, and they're larger on disk. For the MVP, this doesn't matter — the bottleneck is LLM API latency (seconds per call), not file I/O (milliseconds). At scale, you'd migrate to a database (PostgreSQL with JSONB columns is a natural fit) or a binary format. The key insight is that the file store interface stays the same regardless of the backend. The ",(0,s.jsx)("code",{className:"code-inline",children:"FamilyFileStore"})," class exposes ",(0,s.jsx)("code",{className:"code-inline",children:"read()"}),", ",(0,s.jsx)("code",{className:"code-inline",children:"write()"}),", and ",(0,s.jsx)("code",{className:"code-inline",children:"merge_delta()"})," methods. The current implementation uses JSON files; a future implementation might use PostgreSQL. The rest of the system doesn't care."]}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Concurrent Access and Locking"}),(0,s.jsx)("p",{children:"When multiple agents run concurrently — which they will during BFS phases where dozens of families are being processed in parallel — they may attempt to read and write the same family_file simultaneously. Without coordination, this creates race conditions: two agents read the file, both make changes, and the second write overwrites the first agent's changes."}),(0,s.jsxs)("p",{children:["The solution is per-family async locks. The file store maintains a dictionary of ",(0,s.jsx)("code",{className:"code-inline",children:"asyncio.Lock"})," objects keyed by family_id. Reads and writes acquire the lock before accessing the file. Writes use atomic rename: write the complete JSON to a temp file (same directory, ",(0,s.jsx)("code",{className:"code-inline",children:".tmp"})," suffix), then rename the temp file to the target path. On POSIX systems, rename is atomic — either the old file exists or the new file exists, never neither and never a half-written file. This means a crash mid-write leaves the original file intact."]}),(0,s.jsxs)("p",{children:["For the MVP, in-process asyncio locks are sufficient because everything runs in one Python process. At scale — multiple worker processes, multiple machines, or a distributed deployment — you'd need distributed locks. Redis-based locks (using the Redlock algorithm), file-system advisory locks (",(0,s.jsx)("code",{className:"code-inline",children:"fcntl.flock"}),"), or database row-level locking are all viable options. The interface stays the same; only the lock implementation changes. This is a strength of the architecture: the locking strategy is an implementation detail of the file store, invisible to agents and policies."]})]})},tag:"infra"},{id:"ch7",num:7,title:"Context Engineering",subtitle:"Window Budgets & Compaction",component:function(){return(0,s.jsxs)("article",{className:"prose-body",children:[(0,s.jsx)("div",{className:"chapter-badge",children:"Chapter 07"}),(0,s.jsx)("h1",{className:"heading-display text-4xl mb-3",children:"Context Engineering"}),(0,s.jsx)("p",{className:"text-lg mb-10",style:{color:"var(--text-tertiary)",fontFamily:"var(--font-body)"},children:"Managing the finite context window — budgets, input construction, and history compaction — is the difference between an agent that works on toy examples and one that works on real families."}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"The Constraint"}),(0,s.jsx)("p",{children:"Every LLM call operates within a finite context window. Claude's window is 200k tokens; GPT-4 Turbo's is 128k. This window must contain everything the model needs to produce its output: the system prompt that defines the agent's behavior, the complete conversation history (every prior tool call and its result, accumulated across iterations), the input data (the family_file contents, in whatever form you've injected them), all tool definitions (the JSON schemas that tell the model what tools are available and how to call them), and enough room for the model's output. If the total exceeds the window, the API call fails. If it's close to the limit, the model's performance degrades — it struggles to attend to information at the boundaries of the window."}),(0,s.jsxs)("p",{children:["For Architecture_V1, context pressure comes from two distinct directions, and they compound in the worst case. First, ",(0,s.jsx)("strong",{children:"within an agent loop"}),": each tool-use iteration appends to the message history. When the agent calls a web search tool, the result might be 1-5k tokens of scraped web content. When it calls a ",(0,s.jsx)("code",{className:"code-inline",children:"read_family_file"})," tool, the result is the full JSON serialization of the file. After 5 iterations with 2 tool calls each, the accumulated history can be 10-30k tokens — a significant fraction of the window, and it grows linearly with each iteration. Second, ",(0,s.jsx)("strong",{children:"family_file size as input"}),": injecting a large family's data into the initial prompt can consume 10-20k tokens for an 8+ member family with rich personal_data. When both factors combine (large family + many iterations), you can burn through 50-80k tokens of context before the agent even begins its final reasoning pass."]}),(0,s.jsx)("p",{children:"Context engineering is the discipline of fitting all of this into the window, deciding what to include and what to leave out, and ensuring that what you include is structured for maximum model comprehension. It is not an optimization afterthought — it is a first-class design concern that shapes the agent architecture itself."}),(0,s.jsxs)("div",{className:"stat-row",children:[(0,s.jsxs)("div",{className:"stat-card",children:[(0,s.jsx)("div",{className:"stat-card-value",children:"200k"}),(0,s.jsx)("div",{className:"stat-card-label",children:"Claude window"})]}),(0,s.jsxs)("div",{className:"stat-card",children:[(0,s.jsx)("div",{className:"stat-card-value",children:"~3k"}),(0,s.jsx)("div",{className:"stat-card-label",children:"System prompt"})]}),(0,s.jsxs)("div",{className:"stat-card",children:[(0,s.jsx)("div",{className:"stat-card-value",children:"~5k"}),(0,s.jsx)("div",{className:"stat-card-label",children:"Per iteration"})]}),(0,s.jsxs)("div",{className:"stat-card",children:[(0,s.jsx)("div",{className:"stat-card-value",children:"~15k"}),(0,s.jsx)("div",{className:"stat-card-label",children:"Large family input"})]})]}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"Token Budget Allocation"}),(0,s.jsx)("p",{children:"Before constructing any prompt, plan the context window budget. Think of it like a financial budget: you allocate fixed costs (system prompt, tool schemas, output reservation, safety margin), and whatever remains is the variable budget for conversation history. If the fixed costs exceed the window, you have a structural problem. If the variable budget is too small for the expected iteration count, the agent will run out of context mid-execution."}),(0,s.jsxs)("p",{children:["The budget breaks down as follows. The ",(0,s.jsx)("strong",{children:"system prompt"})," is typically 1-3k tokens — it's a fixed cost that doesn't grow with the data. The ",(0,s.jsx)("strong",{children:"tool schemas"})," cost 50-200 tokens per tool, depending on the complexity of the parameter descriptions; an agent with 5 tools might consume 500-1000 tokens just for the schemas. The ",(0,s.jsx)("strong",{children:"output reservation"})," is the ",(0,s.jsx)("code",{className:"code-inline",children:"max_tokens"})," setting you pass to the API — the maximum tokens the model is allowed to generate in its response. The ",(0,s.jsx)("strong",{children:"safety margin"})," accounts for tokenizer estimation errors (your character-based approximation of token count won't be exact) and for the overhead of message framing (role labels, content type markers). A 5k token safety margin is conservative but safe."]}),(0,s.jsxs)("p",{children:["What remains after subtracting all fixed allocations is the ",(0,s.jsx)("strong",{children:"history budget"})," — the pool of tokens available for the user messages and assistant messages that accumulate during the agent loop. Dividing this by the estimated tokens per iteration gives you the maximum number of iterations the agent can run before context exhaustion. If your history budget is 50k tokens and each iteration consumes about 5k tokens (a web search result + the model's tool call + the next prompt), the agent can iterate roughly 10 times. Plan accordingly."]}),(0,s.jsxs)("div",{className:"callout",children:[(0,s.jsx)("strong",{children:"Budget Audit"}),(0,s.jsxs)("p",{className:"mt-2 mb-0",children:["The budget audit should run ",(0,s.jsx)("em",{children:"before every agent invocation"}),". If the input data alone would consume 80% of the available budget, the context strategy must switch (from full injection to summary-plus-detail-on-demand, or from whole-family mode to per-member mode). Discovering mid-execution that you've run out of context is expensive — you've already spent the tokens for the iterations that completed before the failure, and you have no way to recover the model's intermediate reasoning."]})]}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"Input Construction Strategies"}),(0,s.jsx)("p",{children:"The input is the data you give the agent to work with. For Architecture_V1, this is primarily the family_file (or relevant subsets of it). Three strategies exist, in order of increasing sophistication and token efficiency."}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Strategy 1: Full Context Injection"}),(0,s.jsx)("p",{children:"Pass the entire family_file as part of the user message — serialize it to JSON and include it verbatim. This is the simplest approach and the most intuitive: the model sees everything, so it can reason about the complete family state. A 5-member family with moderate data consumes 3-5k tokens. A 10-member family with rich personal_data can be 15-20k tokens. Use this for small families in whole-family mode, or on first passes where the data is sparse and the file is small."}),(0,s.jsx)("p",{children:"The downside is that the model may not need most of the data. A career enrichment agent receiving a full family_file with 8 members' social media links, education histories, and relationship data is getting far more context than it needs to look up someone's job title. The model still processes all of it, paying an attention cost and an inference latency cost for information it will never use."}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Strategy 2: Summary Plus Detail-on-Demand"}),(0,s.jsxs)("p",{children:["Inject a compact summary into the prompt — member names, relationships, and field fill rates — and provide a ",(0,s.jsx)("code",{className:"code-inline",children:"read_member_data"})," tool that retrieves full details for specific members. The summary is 200-500 tokens regardless of family size. The agent reads the summary, identifies which members it needs to examine in detail, and fetches only those members' data via tool calls. Tokens are consumed incrementally, on demand, rather than upfront for the entire family."]}),(0,s.jsx)("p",{children:"This is the preferred strategy for large families and per-member mode agents. The tradeoff is latency: each detail fetch is an additional tool-use iteration, adding one round trip to the LLM. For an agent that needs to examine 3 out of 10 members, the net effect is positive — you save the 7 members' worth of upfront tokens and spend only 3 tool-call iterations. For an agent that needs to examine all 10 members, you've made things slower without saving tokens. The policy's config builder should choose the strategy based on the expected usage pattern."}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Strategy 3: Targeted Projection"}),(0,s.jsx)("p",{children:"Inject only the fields relevant to the agent's task. A career enrichment agent doesn't need social media links or early life data. The projection filters the family_file to include only the field categories specified in the agent config. This produces the smallest possible input — sometimes as little as 500 tokens for a single member's relevant fields — and the most focused prompt. The model doesn't waste attention on irrelevant data, which empirically improves output quality for targeted tasks."}),(0,s.jsx)("p",{children:"The tradeoff is coupling: the config builder must know which fields each agent cares about. If you add a new agent that uses a novel combination of fields, you need to update the projection mapping. This is manageable for the MVP (static agent registry → static field mappings) but becomes cumbersome as the agent registry grows. The skill system (Chapter 8) can eventually learn optimal projections from telemetry data."}),(0,s.jsx)("div",{className:"section-divider",children:"History Management"}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"Conversation History Compaction"}),(0,s.jsx)("p",{children:"As the agent loop iterates, the conversation history grows. At some point — often around iteration 6-8 for a typical agent — the accumulated history threatens to exceed the available budget. Three strategies handle this, in order of complexity and information preservation. In practice, you should implement all three and apply them in sequence: truncate first (cheapest), then slide if needed, then summarize as a last resort."}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Truncate Tool Results at Return Time"}),(0,s.jsx)("p",{children:"Before appending a tool result to the history, truncate it to a maximum token count — say, 2000 tokens. Keep the first portion and the last portion (head and tail), with a truncation notice in between. This is the cheapest approach: no extra LLM calls, no information loss for short results, and predictable history growth. The truncation threshold should be tuned per tool type — web search results can usually be truncated aggressively (the first few snippets contain the most relevant information), while family_file reads should be truncated more conservatively (the structure matters, and truncating mid-JSON can confuse the model)."}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Sliding Window with Key Fact Extraction"}),(0,s.jsx)("p",{children:"Keep only the last N exchanges in full. For discarded exchanges, extract key facts using pattern matching (not LLM calls) on tool names and results. For example: \"Searched for 'Robert Chen CEO' → found LinkedIn profile at Goldman Sachs.\" The extracted facts are prepended to the history as a compact summary message. This preserves the most important information from older exchanges while bounding total history size. The extraction is deterministic and fast — regex patterns on tool names and result structures, not semantic analysis."}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Summarize Old Exchanges"}),(0,s.jsx)("p",{children:"When the history exceeds a threshold and the sliding window isn't sufficient, summarize all but the most recent 2 exchanges using a cheap, fast model (Claude Haiku). The summary captures what was searched, what was found, and what actions were taken. The entire old history is replaced with a single message containing the summary. This is the most expensive approach — an extra LLM call that adds latency and cost — but it preserves the most information per token. Use it as a last resort, not as a default."}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"Model Selection by Context Needs"}),(0,s.jsx)("p",{children:"Different agents have different context requirements, and models have different context window sizes, capabilities, and costs. Matching the model to the agent's needs is a cost-optimization decision that the policy's config builder makes."}),(0,s.jsx)("p",{children:"Cold-start discovery uses a small context (just a name and class year) and doesn't need deep reasoning — a fast, cheap model like Claude Haiku is ideal, handling the task in under a second at minimal cost. Per-member enrichment needs medium context and moderate reasoning — Claude Sonnet balances capability and cost. Whole-family enrichment needs the full context window and strong reasoning about inter-member relationships — Sonnet or Opus depending on the family's complexity. Cross-reference discovery injects population context from the population index, requiring a large context window and strong analytical capability — this is where Opus earns its cost premium."}),(0,s.jsx)("p",{children:"The model is specified in the AgentConfig, which means it can vary not just by agent type but by retry attempt. A cold start that fails with Haiku might be retried with Sonnet — the config builder upgrades the model for the retry, spending more tokens on a problem that the cheaper model couldn't solve. This adaptive model selection is a simple but effective optimization that the static agent selector can implement with just an additional branch based on the retry count."})]})},tag:"infra"},{id:"ch8",num:8,title:"Beyond MVP",subtitle:"Skill System & Population Learning",component:function(){return(0,s.jsxs)("article",{className:"prose-body",children:[(0,s.jsx)("div",{className:"chapter-badge",children:"Chapter 08"}),(0,s.jsx)("h1",{className:"heading-display text-4xl mb-3",children:"Beyond MVP"}),(0,s.jsx)("p",{className:"text-lg mb-10",style:{color:"var(--text-tertiary)",fontFamily:"var(--font-body)"},children:"The skill-based adaptive agent selection system and population-level learning — documented now for architectural continuity, built later when the foundation is stable."}),(0,s.jsxs)("div",{className:"callout-rose callout",children:[(0,s.jsx)("strong",{children:"Status: Design Only"}),(0,s.jsxs)("p",{className:"mt-2 mb-0",children:["The systems described in this chapter are explicitly out of scope for the MVP. They are documented here for two reasons: first, to ensure the MVP architecture does not make design decisions that preclude these systems (every interface in Chapters 1-7 was designed with these extensions in mind); second, to provide a clear roadmap for post-MVP development with enough technical specificity to guide implementation when the time comes. ",(0,s.jsx)("strong",{children:"Do not attempt to build these systems until the MVP is stable, instrumented, and producing telemetry data."})," Without telemetry, the skill system has nothing to learn from and the population learning system has nothing to inject."]})]}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"The Skill System: Learned Agent Selection"}),(0,s.jsxs)("p",{children:["In the MVP, the policy's agent selector is a hand-coded function with static conditional branches. If there's no family_file, use cold_start. If there's enrichment data, use enrichment_aware. If it's pass 2+, use cross_reference. These rules are reasonable starting points — they encode domain knowledge about which agents are appropriate for which situations. But they're based on programmer intuition, not on empirical measurement. The programmer doesn't ",(0,s.jsx)("em",{children:"know"})," that cold_start is the best agent for a bare name — they ",(0,s.jsx)("em",{children:"believe"})," it is, based on their understanding of the agents' designs and the data landscape. And that belief might be wrong, or it might be right in general but wrong for specific subpopulations."]}),(0,s.jsxs)("p",{children:["The skill system replaces static rules with ",(0,s.jsx)("strong",{children:"learned routing"}),' — the system discovers which agent configurations work best for which types of input, and routes accordingly. "Learning" here doesn\'t mean training a neural network or fine-tuning a model. It means ',(0,s.jsx)("em",{children:"recording what happened, analyzing the records, and updating routing decisions based on observed outcomes"}),". It's empirical optimization, not machine learning. The math is simple (averages, confidence intervals, a UCB1-style scoring function). The hard part is building the telemetry pipeline that produces reliable records and the mining process that extracts actionable patterns."]}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"What a Skill Is"}),(0,s.jsxs)("p",{children:['A "skill" in this context is a specific pairing of ',(0,s.jsx)("em",{children:"input characteristics"})," and ",(0,s.jsx)("em",{children:"agent configuration"})," that has demonstrated measurable effectiveness. The system learns, for example, that for families where the seed student has a LinkedIn profile and at least one parent in the finance industry, the ",(0,s.jsx)("code",{className:"code-inline",children:"enrichment_aware_discovery"})," agent with the ",(0,s.jsx)("code",{className:"code-inline",children:"search_linkedin"})," and ",(0,s.jsx)("code",{className:"code-inline",children:"search_sec_filings"})," tools outperforms the generic ",(0,s.jsx)("code",{className:"code-inline",children:"contextual_discovery"}),' agent by 40% in terms of fields filled per token spent. This pairing — "internet-present finance families → enrichment_aware + SEC tools" — is a skill.']}),(0,s.jsxs)("p",{children:["Each skill bundles four things. The ",(0,s.jsx)("strong",{children:"agent configuration"})," it maps to — the complete AgentConfig object (model, prompt template, tool set, output schema, temperature, token budget). The ",(0,s.jsx)("strong",{children:"applicability conditions"}),' — a predicate over the DataProfile that determines when this skill should be considered (e.g., "member count between 3 and 6, has internet presence, pass number ≤ 2"). The ',(0,s.jsx)("strong",{children:"performance metrics"})," — effectiveness (fields filled ÷ fields attempted), precision (how often filled fields are later confirmed by independent sources), token efficiency (fields filled ÷ tokens spent), and sample size (how many times this skill has been invoked, which determines statistical confidence in the metrics). And ",(0,s.jsx)("strong",{children:"provenance"})," — how the skill was discovered: manual definition by an operator, automated mining from telemetry, or evolution from a parent skill."]}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Skill Matching: Exploitation vs. Exploration"}),(0,s.jsx)("p",{children:"When a work unit is dispatched, the skill matcher evaluates all active skills whose applicability conditions match the work unit's DataProfile. Among the matching skills, it selects the one with the highest composite score. The scoring function must balance two competing objectives."}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Exploitation"})," favors the skill with the best proven track record — the one that has consistently produced the most fields per token in past invocations. If enrichment_aware_discovery has an effectiveness of 0.82 over 150 invocations, and contextual_discovery has an effectiveness of 0.61 over 200 invocations, exploitation says: always use enrichment_aware."]}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Exploration"})," favors trying under-tested skills that might be better than the current best but haven't had enough invocations to prove it. A newly mined skill with an effectiveness of 0.90 over 8 invocations might be genuinely superior, or it might be a statistical fluke from a small sample. Exploration says: give it more chances to prove itself."]}),(0,s.jsxs)("p",{children:["The scoring function uses a UCB1-inspired formula that handles this tradeoff. The score is the skill's ",(0,s.jsx)("code",{className:"code-inline",children:"effectiveness × token_efficiency"})," (exploitation term) plus an exploration bonus proportional to ",(0,s.jsx)("code",{className:"code-inline",children:"√(2 × ln(total_invocations) / skill_sample_size)"}),". Skills with few samples get a large exploration bonus. Skills with many samples are judged almost entirely on their track record. The ",(0,s.jsx)("code",{className:"code-inline",children:"0.1"})," coefficient on the exploration term is tunable — higher values produce more exploration (more experimentation, slower convergence to the best skill), lower values produce more exploitation (less experimentation, faster convergence but risk of getting stuck on a suboptimal skill)."]}),(0,s.jsx)(ne,{label:"Skill matching with UCB1 scoring",children:(0,s.jsx)("div",{className:"code-block","data-lang":"python",children:`class SkillMatcher:
    def __init__(self, registry, min_confidence=0.7, min_samples=20):
        self.registry = registry
        self.min_confidence = min_confidence
        self.min_samples = min_samples

    def match(self, unit: WorkUnit) -> AgentConfig:
        profile = unit.data_profile

        # Find all applicable skills
        candidates = [s for s in self.registry.active_skills()
                      if s.applies_when.matches(profile, unit)]

        # Filter by statistical confidence
        confident = [s for s in candidates
                     if s.sample_size >= self.min_samples]

        if not confident:
            return static_selector(unit)  # Fallback to MVP rules

        # UCB1-inspired scoring
        scored = [(s, self._score(s)) for s in confident]
        best = max(scored, key=lambda x: x[1])
        return best[0].agent_config

    def _score(self, skill) -> float:
        exploitation = skill.effectiveness * skill.token_efficiency
        exploration = math.sqrt(
            2 * math.log(self.registry.total_invocations) / skill.sample_size
        )
        return exploitation + 0.1 * exploration`})}),(0,s.jsxs)("p",{children:["If no skill matches with sufficient confidence — either no skills' applicability conditions match, or all matching skills have too few samples to be statistically reliable — the matcher falls back to the static selector from Chapter 1. This means the skill system is ",(0,s.jsx)("strong",{children:"strictly additive"}),": it can only improve routing compared to the MVP baseline, never degrade it. This is an essential property for production deployment. You can enable the skill system, observe its decisions in the telemetry, and build confidence in its routing before removing the static fallback. If the skill system makes a mistake, the worst case is that it routes to a slightly suboptimal agent — the static fallback's agent — rather than a catastrophically wrong one."]}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Telemetry: The Raw Material"}),(0,s.jsxs)("p",{children:["Skills are discovered from telemetry data. After every agent invocation — every single one, from the first cold_start on the first student to the last re-sweep on the last family — the system records an ",(0,s.jsx)("code",{className:"code-inline",children:"InvocationRecord"}),". This record captures: the input DataProfile (member count, field fill rates, boolean flags), the pass number, the agent config that was selected (agent key, prompt template, tools, model), and the outcome metrics (how many fields the agent attempted to fill, how many it successfully filled, how many tokens it consumed, how long it took, and the terminal status)."]}),(0,s.jsxs)("p",{children:["The invocation records are the raw material that skill mining, skill updating, and the ablation study all consume. They must be comprehensive (capture everything needed for analysis), compact (don't bloat the record with full family_file snapshots), and durable (persisted to disk, not just held in memory). In the MVP, these records are already being produced by the chain instrumentation system from Chapter 2 — the ",(0,s.jsx)("code",{className:"code-inline",children:"AgentTrace"})," and ",(0,s.jsx)("code",{className:"code-inline",children:"ChainTrace"})," objects contain all the necessary data. The post-MVP step is structuring them into a queryable format (a SQLite database or a Parquet file) and building the mining pipeline on top."]}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Skill Discovery via Mining"}),(0,s.jsx)("p",{children:"The mining process runs periodically — after each BFS phase in the hybrid traversal, or on a fixed schedule for long-running pipelines. It analyzes the accumulated invocation records to identify agent-profile pairings that significantly outperform the baseline."}),(0,s.jsxs)("p",{children:["The algorithm groups records by a composite key: ",(0,s.jsx)("strong",{children:"discretized DataProfile × agent key"}),". The DataProfile is discretized to prevent over-fitting to narrow input ranges: member count bucketed into [0, 1-3, 4-6, 7+], pass number into [1, 2, 3+], and boolean flags for internet presence, education data, and career data. This produces a manageable number of buckets (4 × 3 × 2 × 2 × 2 = 96 profile categories). Combined with the agent keys (4 P1 agents × 4 P2 agents = 16), the total space is ~1500 candidate skills. Most of these will have zero or few records — the actual number of populated candidates is much smaller."]}),(0,s.jsx)("p",{children:'For each candidate with at least 10 invocation records, the miner computes the effectiveness and token efficiency, then compares against the population average. Candidates that exceed the average by a configurable margin (default: 10% improvement) are promoted into the skill registry. The applicability conditions are inferred from the discretized profile — "member count 4-6, has internet presence, pass 1-2" — and the agent config is extracted from the records.'}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Skill Evolution and Retirement"}),(0,s.jsx)("p",{children:"Skills aren't static. As the population index grows, as enrichment data accumulates, and as the pipeline makes more passes, the effectiveness of different agent-profile pairings changes. A skill that was effective during the initial BFS passes might become less effective during the re-sweep, because the easy data has already been found and the remaining data requires different strategies."}),(0,s.jsxs)("p",{children:["The skill updater uses an exponential moving average (EMA) with a smoothing factor α (default: 0.1) to weight recent invocations more heavily than older ones. After each new invocation of a skill, its effectiveness is updated: ",(0,s.jsx)("code",{className:"code-inline",children:"new_eff = (1 - α) × old_eff + α × invocation_eff"}),". This means the skill's score reflects its recent performance, not just its historical average. A skill that was effective 200 invocations ago but has declined over the last 50 will see its score decrease, and the matcher will eventually prefer a different skill."]}),(0,s.jsx)("p",{children:"Skills with consistently poor performance are retired — marked inactive and excluded from the matcher's candidate set. The retirement criterion is simple: if a skill's effectiveness is below 0.1 (essentially useless) after at least 50 invocations, retire it. Retired skills remain in the registry for auditing and analysis — they're never deleted, just deactivated. A retired skill can be manually reactivated if an operator believes the conditions that caused its decline have changed."}),(0,s.jsx)("div",{className:"section-divider",children:"Population Learning"}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"Multi-Pass Population Learning"}),(0,s.jsxs)("p",{children:["On early passes, the system operates on each family in relative isolation. Each agent has the family_file, its tools, and its system prompt — but no awareness of the broader population. On later passes, ",(0,s.jsx)("strong",{children:"knowledge accumulated across the entire population"})," should improve the agents' effectiveness. If 30 families in the population have members who worked at Goldman Sachs, the system should recognize Goldman Sachs as a significant node in the population's professional network and use that knowledge when processing Goldman Sachs-connected families. If 15 families share members at Brookline High School, the system should use that pattern to improve discovery for other Brookline-connected families."]}),(0,s.jsxs)("p",{children:["This is what population learning means: the system gets smarter about the ",(0,s.jsx)("em",{children:"entire population"})," with each pass, not just about individual families. The insight is that the population is not just a collection of independent families — it's a ",(0,s.jsx)("em",{children:"network"})," with shared employers, shared schools, shared neighborhoods, and shared affiliations. Exploiting these shared connections is the highest-leverage optimization available once the MVP is working."]}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"What the System Learns Across Passes"}),(0,s.jsxs)("p",{children:["The knowledge accumulation is progressive, with each pass building on the previous ones. After ",(0,s.jsx)("strong",{children:"Pass 1"})," (discovery), the system knows names, rough relationships, and class years. No cross-family context exists yet — each family is an island. After ",(0,s.jsx)("strong",{children:"Pass 2"})," (enrichment), the system knows education, career, internet presence, and affiliations per member. The population index can now be built, and it immediately reveals connections that were invisible: two families share an employer, three families have members at the same school, a charitable trust connects two apparently unrelated families."]}),(0,s.jsxs)("p",{children:["After ",(0,s.jsx)("strong",{children:"Pass 3"})," (cross-reference discovery using the population index), the system has actively explored inter-family connections. New family members have been discovered through cross-referencing, and the index has grown richer and more accurate. After ",(0,s.jsx)("strong",{children:"Pass 4+"})," (deep enrichment with population priors), the system has enough accumulated data to recognize statistical patterns: typical career paths for MIT CS majors (75% go into tech, 15% into finance, 5% into consulting), common affiliations (the Phi Beta Kappa society appears in 20% of families), expected family sizes by demographic profile. These patterns act as ",(0,s.jsx)("em",{children:"priors"})," that help P2 fill sparse profiles — if every other MIT CS 2025 graduate went into tech, the model can assign higher confidence to tech-related career data for the remaining graduates whose career information is ambiguous."]}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Context Injection Mechanisms"}),(0,s.jsx)("p",{children:"Population context reaches agents through two channels, each with different strengths."}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Prompt injection"}),' adds a section to the system prompt populated with population-level data relevant to the current target. This section might include: other members in the population who share the target family\'s employer ("Other members at Goldman Sachs: Alice Chen [Family_12], James Park [Family_37]"), the most common employers and schools across the population, and any cross-family connections that have been identified. Prompt injection is simple and predictable — the agent sees the context immediately and can use it from the first iteration. The downside is token cost: injecting context for a family with 15 cross-family connections might consume 1-2k tokens, reducing the budget available for conversation history.']}),(0,s.jsxs)("p",{children:[(0,s.jsx)("strong",{children:"Tool-based access"})," provides the ",(0,s.jsx)("code",{className:"code-inline",children:"query_population_index"})," tool, which lets the agent actively search the population for connections on demand. The agent decides what to query (\"Find members who work at Goldman Sachs and went to MIT\") and when, consuming tokens incrementally. This is more flexible than prompt injection — the agent can explore hypotheses that the prompt author didn't anticipate — but it's more expensive per-query (each tool call is a round trip through the agent loop) and requires the agent to know that the tool exists and to use it effectively (which depends on the system prompt's description of the tool)."]}),(0,s.jsx)("p",{children:"For maximum effectiveness, use both: inject a compact summary of the most relevant cross-family connections (the top 5-10 by relevance score) into the prompt, and provide the population index tool for deeper exploration. This gives the agent immediate context for the most obvious connections while preserving the flexibility to discover less obvious ones through active querying."}),(0,s.jsx)("h3",{className:"heading-sub text-xl mt-8 mb-4",children:"Re-Entry Prioritization"}),(0,s.jsx)("p",{children:"On each re-sweep pass, which families should be re-opened? Not every family benefits equally from population context. A family with no connections to the population index gains nothing from re-processing — the agent will receive the same empty population context it had before. A family with many cross-family connections, unresolved name references, and gaps that population priors could fill has significant upside from a re-sweep with enriched context."}),(0,s.jsxs)("p",{children:["The re-entry prioritization function ranks families by their estimated benefit from population context. The inputs are: ",(0,s.jsx)("strong",{children:"new connections since last pass"})," (other families that were enriched since this family was last processed, creating new indexed values that might match), ",(0,s.jsx)("strong",{children:"resolvable references"})," (name references in the family_file that the population index can now resolve, e.g., \"the trust mentions a 'John Park' and there's now a John Park in Family_37\"), and ",(0,s.jsx)("strong",{children:"gap fillability"})," (fields that are missing in this family but common in similar families, suggesting that population priors could help)."]}),(0,s.jsx)("p",{children:"A diminishing returns factor is applied per pass: the priority for re-entry on pass N is multiplied by 0.7^(N-1). This ensures the system doesn't endlessly re-process families with marginal gains. By pass 5, the re-entry priority is multiplied by ~0.24, meaning only families with very strong population signals are re-opened. This natural decay, combined with the population-level termination conditions from Chapter 4, ensures convergence."}),(0,s.jsx)("div",{className:"section-divider",children:"Validation"}),(0,s.jsx)("h2",{className:"heading-section text-2xl mt-12 mb-6",children:"The Ablation Study"}),(0,s.jsxs)("p",{children:['Architecture_V1 mentions: "When personal_data from LLM_Policy_2 is available, [P1] returns higher-recall family members. This differential is the empirical basis for the future graph_df ablation study." The ablation is designed to ',(0,s.jsx)("em",{children:"quantify"})," the value of population learning — specifically, how much does P1 recall improve when the agent has access to population context versus when it doesn't?"]}),(0,s.jsxs)("p",{children:["The study design is straightforward. For each family in the study sample, run the same P1 agent twice: once as the ",(0,s.jsx)("strong",{children:"control"})," (family_file only, no population context, no population index tool) and once as the ",(0,s.jsx)("strong",{children:"treatment"})," (family_file plus population context injection plus the query_population_index tool). The outcome metric is new members discovered. The cost metric is tokens consumed. If the treatment consistently discovers more members than the control, the delta quantifies the value of population learning. If the delta is small or inconsistent, population learning may not justify its complexity and cost."]}),(0,s.jsxs)("p",{children:["The study should be run on a ",(0,s.jsx)("strong",{children:"stratified sample"})," — not the entire population, because the ablation doubles the P1 cost for every family included. Select 50-100 families spanning the full range of data profiles: small families and large ones, sparse data and rich data, families with many cross-family connections and families with none. Stratification ensures the results generalize to the full population rather than reflecting the bias of a random sample that might over-represent common profiles."]}),(0,s.jsxs)("p",{children:["The ablation's results inform two decisions. First, whether population learning justifies its infrastructure cost (building and maintaining the population index, computing cross-family connections, injecting context, running the re-sweep phase). If the treatment discovers an average of 0.5 more members per family across the sample, and the population has 500 families, that's 250 additional members — likely worth the investment. If the average delta is 0.05, it's probably not worth the complexity. Second, the results reveal ",(0,s.jsx)("strong",{children:"which family profiles benefit most"})," from cross-family context. Families with many connections might see a delta of 2-3 members; families with no connections see a delta of 0. This heterogeneity informs the re-entry prioritization function — weight the signals that predict large deltas more heavily."]}),(0,s.jsx)(ne,{label:"Ablation study runner",children:(0,s.jsx)("div",{className:"code-block","data-lang":"python",children:`async def run_ablation(family_id: str, pass_number: int):
    family_file = await store.read(family_id)

    # Control: no population context
    control_config = policy_1.select_agent(
        PolicyState(family_file=family_file, pass_number=pass_number),
        use_population_context=False,
    )
    control_result = await execute_agent(control_config, state, client)

    # Treatment: with population context
    treatment_config = policy_1.select_agent(
        PolicyState(family_file=family_file, pass_number=pass_number),
        use_population_context=True,
    )
    treatment_result = await execute_agent(treatment_config, state, client)

    return AblationResult(
        family_id=family_id, pass_number=pass_number,
        control_members=len(control_result.candidates),
        treatment_members=len(treatment_result.candidates),
        delta=len(treatment_result.candidates) - len(control_result.candidates),
        control_tokens=control_result.tokens_used,
        treatment_tokens=treatment_result.tokens_used,

<script>
// GitHub Pages guard: hide Setup Audiobook UI when no local dev server is running.
// On localhost:3333, client-patch.js (injected by server.js) handles everything.
// On static hosting, generation is impossible — so hide the button entirely.
(function(){
  fetch("/api/status",{signal:AbortSignal.timeout(2000)})
    .then(function(r){return r.ok?r.json():Promise.reject()})
    .then(function(d){if(d&&d.mode==="local")return})
    .catch(function(){
      // Not on local dev server — hide all audiobook setup triggers
      function hide(){
        document.querySelectorAll("button").forEach(function(b){
          if(b.textContent&&b.textContent.trim().match(/^(Setup Audiobook|Audio Ready)$/)){
            b.style.display="none";
          }
        });
        // Also hide the sidebar and mobile audio setup container borders
        document.querySelectorAll(".border-t").forEach(function(el){
          if(el.querySelector&&el.querySelector("button")===null) return;
          var btn=el.querySelector("button");
          if(btn&&btn.textContent&&btn.textContent.trim().match(/^(Setup Audiobook|Audio Ready)$/)){
            el.style.display="none";
          }
        });
      }
      // Run after React mounts
      if(document.readyState==="complete") hide();
      else window.addEventListener("load",hide);
      // Also observe for late renders
      var mo=new MutationObserver(hide);
      mo.observe(document.body,{childList:true,subtree:true});
      setTimeout(function(){mo.disconnect()},5000);
    });
})();
</script>
<script>
// Chapter persistence via URL hash — works on both local dev and GitHub Pages.
// Restores the active chapter from #ch1-#ch8 in the URL after React mounts.
(function(){
  var valid=["ch1","ch2","ch3","ch4","ch5","ch6","ch7","ch8"];
  function restore(){
    var h=location.hash.replace("#","");
    var idx=valid.indexOf(h);
    if(idx<0) return;
    var btns=document.querySelectorAll("nav button");
    if(btns[idx]) btns[idx].click();
  }
  // Restore on initial load (after React mounts)
  function init(){
    if(!location.hash) return;
    setTimeout(restore,300);
  }
  if(document.readyState==="complete") init();
  else window.addEventListener("load",init);
  // Sync hash on nav clicks
  function syncHash(){
    var btns=document.querySelectorAll("nav button");
    btns.forEach(function(btn,i){
      btn.addEventListener("click",function(){
        if(valid[i]) history.replaceState(null,"","#"+valid[i]);
      });
    });
  }
  // Wait for React to render nav buttons
  var mo=new MutationObserver(function(){
    if(document.querySelectorAll("nav button").length>=8){
      mo.disconnect();
      syncHash();
      init();
    }
  });
  mo.observe(document.body,{childList:true,subtree:true});
  // Back/forward navigation
  window.addEventListener("hashchange",restore);
})();
</script>
